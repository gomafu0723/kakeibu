<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家計簿">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>家計簿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--bg2:#fdf9f3;--bg3:#ede8df;--bg4:#ddd8ce;
  --text:#1c1917;--text2:#44403c;--text3:#78716c;
  --accent:#44301e;--accent-text:#f5f0e8;
  --green:#15803d;--green-light:#dcfce7;
  --amber:#b45309;--amber-light:#fef3c7;
  --red:#b91c1c;--red-light:#fee2e2;
  --orange:#c2410c;--orange-light:#fff7ed;
  --border:#d6d0c7;--radius:14px;--shadow:0 1px 4px rgba(0,0,0,.07);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:90px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-top:env(safe-area-inset-top,12px)}
.header h1{font-size:22px;font-weight:700;color:var(--text)}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:16px;box-shadow:var(--shadow)}
.month-nav span{font-family:'DM Mono',monospace;font-size:15px;color:var(--text2);font-weight:500}
.sync-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg2);border-radius:12px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{font-size:13px;color:var(--text3);flex:1}
.sync-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:500}
.hero-card{background:var(--bg2);border-radius:18px;padding:20px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.hero-card.accent{background:var(--accent);border:none}
.hero-label{font-size:12px;color:var(--text3);letter-spacing:.06em;margin-bottom:4px;font-weight:500}
.hero-card.accent .hero-label{color:rgba(245,240,232,.55)}
.hero-amount{font-family:'DM Mono',monospace;font-size:34px;font-weight:500;color:var(--green)}
.hero-card.accent .hero-amount{color:#fb923c}
.hero-amount.warn{color:var(--amber)}
.hero-amount.over{color:var(--red)}
.hero-sub{font-size:12px;color:var(--text3);margin-top:4px}
.hero-card.accent .hero-sub{color:rgba(245,240,232,.55)}
.progress-track{background:var(--bg4);border-radius:4px;height:6px;margin-top:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.ok-bar{background:var(--green)}.warn-bar{background:var(--amber)}.over-bar{background:var(--red)}
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mini-card{background:var(--bg2);border-radius:var(--radius);padding:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.mini-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600;letter-spacing:.05em}
.mini-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500}
.section-title{font-size:12px;color:var(--text3);letter-spacing:.08em;margin:18px 0 8px;font-weight:700}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.budget-item{background:var(--bg2);border-radius:var(--radius);padding:13px;border:1px solid var(--border);box-shadow:var(--shadow)}
.budget-item .bname{font-size:12px;color:var(--text3);margin-bottom:3px;font-weight:600}
.budget-item .bremain{font-family:'DM Mono',monospace;font-size:16px;font-weight:600}
.budget-item .btotal{font-size:11px;color:var(--text3);margin-top:2px}
.budget-item .bbar{background:var(--bg4);border-radius:3px;height:4px;margin-top:8px;overflow:hidden}
.budget-item .bbar-fill{height:100%;border-radius:3px}
.ok{color:var(--green)}.warn{color:var(--amber)}.over{color:var(--red)}
.list-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.list-item:last-child{border-bottom:none}
.list-item:active{background:var(--bg3)}
.item-left .iname{font-size:15px;font-weight:500;color:var(--text)}
.item-left .icat{font-size:12px;color:var(--text3);margin-top:2px}
.item-right{text-align:right;flex-shrink:0;margin-left:8px}
.item-right .iamt{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.item-right .idate{font-size:11px;color:var(--text3);margin-top:2px}
.iamt.expense{color:var(--red)}.iamt.income{color:var(--green)}
.empty-msg{padding:24px;text-align:center;color:var(--text3);font-size:14px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(253,249,243,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px));box-shadow:0 -1px 8px rgba(0,0,0,.06)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text3);padding:5px 0}
.tab.active{color:var(--green)}
.tab-icon{font-size:20px}
.tab-label{font-size:11px;font-weight:600}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s ease;max-height:92vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;font-weight:600}
.form-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:16px;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s}
.form-input:focus{border-color:var(--green);background:var(--bg2)}
.form-select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .15s}
.form-select:focus{border-color:var(--green)}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-primary{flex:1;background:var(--accent);color:var(--accent-text);border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.btn-secondary{flex:1;background:var(--bg3);color:var(--text2);border:none;border-radius:14px;padding:15px;font-size:15px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;font-weight:500}
.btn-danger{flex:1;background:#fee2e2;color:#b91c1c;border:none;border-radius:14px;padding:15px;font-size:15px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;font-weight:500}
.mode-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg3);padding:4px;border-radius:12px}
.mode-tab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;font-weight:500;transition:all .15s}
.mode-tab.active{background:var(--bg2);color:var(--green);box-shadow:var(--shadow);font-weight:700}
.asset-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);margin-bottom:6px;box-shadow:var(--shadow)}
.asset-name{font-size:14px;font-weight:500;color:var(--text)}
.asset-val{font-family:'DM Mono',monospace;font-size:14px;color:var(--text2)}
.asset-input-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.asset-input-row:last-child{border-bottom:none}
.asset-input-label{font-size:14px;flex:1;font-weight:500;color:var(--text)}
.asset-input-field{width:140px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:15px;font-family:'DM Mono',monospace;outline:none;text-align:right;-webkit-appearance:none}
.asset-input-field:focus{border-color:var(--green)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--accent);border-radius:12px;margin-top:10px}
.fixed-balance-item{background:var(--bg2);border-radius:var(--radius);padding:14px;border:1px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow)}
.fixed-balance-name{font-size:12px;color:var(--text3);margin-bottom:4px;font-weight:700;letter-spacing:.05em}
.fixed-balance-row{display:flex;justify-content:space-between;align-items:baseline}
.fixed-balance-remain{font-family:'DM Mono',monospace;font-size:19px;font-weight:600}
.fixed-balance-detail{font-size:12px;color:var(--text3)}
.fixed-bar{background:var(--bg4);border-radius:3px;height:4px;margin-top:8px;overflow:hidden}
.fixed-bar-fill{height:100%;border-radius:3px}
.fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));right:max(16px,calc(50% - 224px));width:54px;height:54px;background:var(--accent);border-radius:50%;border:none;cursor:pointer;font-size:28px;color:var(--accent-text);box-shadow:0 4px 16px rgba(28,25,23,.3);z-index:50;display:flex;align-items:center;justify-content:center}
.asset-record-edit{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:600}
.compare-btn{padding:7px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all .15s}
.compare-btn.active{border-color:var(--green);color:var(--green);background:var(--green-light)}
</style>
</head>
<body>
<div class="app">
  <div id="view-home"></div>
  <div id="view-history" style="display:none"></div>
  <div id="view-asset" style="display:none"></div>
  <div id="view-fixed" style="display:none"></div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('home')" id="tab-home">
    <span class="tab-icon">◎</span><span class="tab-label">ホーム</span>
  </button>
  <button class="tab" onclick="switchTab('history')" id="tab-history">
    <span class="tab-icon">≡</span><span class="tab-label">履歴</span>
  </button>
  <button class="tab" onclick="switchTab('asset')" id="tab-asset">
    <span class="tab-icon">◈</span><span class="tab-label">資産</span>
  </button>
  <button class="tab" onclick="switchTab('fixed')" id="tab-fixed">
    <span class="tab-icon">☰</span><span class="tab-label">積立</span>
  </button>
</div>

<button class="fab" onclick="openModal('input')">＋</button>

<!-- 支出・収入入力モーダル -->
<div class="modal-overlay" id="modal-input">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">入力</div>
    <div class="mode-tabs">
      <div class="mode-tab active" onclick="switchInputType('expense')" id="type-expense">支出</div>
      <div class="mode-tab" onclick="switchInputType('income')" id="type-income">収入</div>
    </div>
    <div id="form-expense">
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="exp-amount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="exp-cat">
          <option>食料費</option><option>生活費</option><option>その他</option>
          <option>通信費</option><option>光熱費</option><option>保険費</option>
          <option>住居費</option><option>教育費</option>
          <option disabled>── 積立 ──</option>
          <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
          <option>自動車税積立</option><option>車検積立</option>
          <option>固定資産税積立</option><option>自動車保険積立</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">詳細（任意）</label>
        <input class="form-input" type="text" id="exp-detail" placeholder="例：スーパー、Amazon">
      </div>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" type="date" id="exp-date">
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('input')">キャンセル</button>
        <button class="btn-primary" onclick="addExpense()">追加</button>
      </div>
    </div>
    <div id="form-income" style="display:none">
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="inc-amount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">入金先</label>
        <select class="form-select" id="inc-cat">
          <option>よ収入</option><option>き収入</option><option>その他収入</option>
          <option>児童手当</option><option>雑収入</option>
          <option disabled>── 積立口座へ ──</option>
          <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
          <option>自動車税積立</option><option>車検積立</option>
          <option>固定資産税積立</option><option>自動車保険積立</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">詳細（任意）</label>
        <input class="form-input" type="text" id="inc-detail" placeholder="例：給与、ボーナス">
      </div>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" type="date" id="inc-date">
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('input')">キャンセル</button>
        <button class="btn-primary" onclick="addIncome()">追加</button>
      </div>
    </div>
  </div>
</div>

<!-- 支出編集モーダル -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">支出を編集</div>
    <input type="hidden" id="edit-idx">
    <div class="form-group"><label class="form-label">金額</label><input class="form-input" type="number" id="edit-amount" inputmode="numeric"></div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="edit-cat">
        <option>食料費</option><option>生活費</option><option>その他</option>
        <option>通信費</option><option>光熱費</option><option>保険費</option>
        <option>住居費</option><option>教育費</option>
        <option disabled>── 積立 ──</option>
        <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
        <option>自動車税積立</option><option>車検積立</option>
        <option>固定資産税積立</option><option>自動車保険積立</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">詳細</label><input class="form-input" type="text" id="edit-detail"></div>
    <div class="form-group"><label class="form-label">日付</label><input class="form-input" type="date" id="edit-date"></div>
    <div class="btn-row">
      <button class="btn-danger" onclick="deleteExpense()">削除</button>
      <button class="btn-secondary" onclick="closeModal('edit')">キャンセル</button>
      <button class="btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 収入編集モーダル -->
<div class="modal-overlay" id="modal-edit-income">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">収入を編集</div>
    <input type="hidden" id="edit-inc-idx">
    <div class="form-group"><label class="form-label">金額</label><input class="form-input" type="number" id="edit-inc-amount" inputmode="numeric"></div>
    <div class="form-group">
      <label class="form-label">入金先</label>
      <select class="form-select" id="edit-inc-cat">
        <option>よ収入</option><option>き収入</option><option>その他収入</option>
        <option>児童手当</option><option>雑収入</option>
        <option disabled>── 積立口座へ ──</option>
        <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
        <option>自動車税積立</option><option>車検積立</option>
        <option>固定資産税積立</option><option>自動車保険積立</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">詳細</label><input class="form-input" type="text" id="edit-inc-detail"></div>
    <div class="form-group"><label class="form-label">日付</label><input class="form-input" type="date" id="edit-inc-date"></div>
    <div class="btn-row">
      <button class="btn-danger" onclick="deleteIncome()">削除</button>
      <button class="btn-secondary" onclick="closeModal('edit-income')">キャンセル</button>
      <button class="btn-primary" onclick="saveIncomeEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 資産入力・編集モーダル -->
<div class="modal-overlay" id="modal-asset">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="asset-modal-title">資産を記録</div>
    <input type="hidden" id="asset-edit-idx">
    <div class="form-group"><label class="form-label">記録日</label><input class="form-input" type="date" id="asset-date"></div>
    <div id="asset-fields" style="background:var(--bg3);border-radius:14px;padding:12px;margin-bottom:12px"></div>
    <div class="btn-row" id="asset-btn-row"></div>
  </div>
</div>

<!-- 比較月選択モーダル -->
<div class="modal-overlay" id="modal-compare">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">比較する月を選択</div>
    <div style="margin-bottom:12px">
      <div class="form-label">基準月</div>
      <select class="form-select" id="compare-base"></select>
    </div>
    <div style="margin-bottom:16px">
      <div class="form-label" style="margin-bottom:8px">比較月（複数選択可）</div>
      <div id="compare-checks" style="background:var(--bg3);border-radius:14px;padding:12px;max-height:280px;overflow-y:auto"></div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('compare')">キャンセル</button>
      <button class="btn-primary" onclick="applyCompare()">適用</button>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxKuVAihUFNSCI1LxTIssawJDJ1NnaA3Kw5FNguS8cA6oyRxQEN2IKV6DVDS4nHSKe3/exec';
const RESERVE=20000;
const BUDGET={食料費:83500,生活費:13000,その他:60000,通信費:10000,光熱費:38000,保険費:12000,住居費:22000,教育費:20000};
const FIXED_AMOUNTS={貯蓄:99000,生命保険積立:64000,IDECO:10000,自動車税積立:3500,車検積立:7000,固定資産税積立:10500,自動車保険積立:2500};
const FIXED_CATS=Object.keys(FIXED_AMOUNTS);
const ASSET_KEYS=['現金','貯蓄','生命保険積立','自動車税積立','車検積立','固定資産税積立','自動車保険積立','史絵梨貯金','涼介貯金','き貯金','よ確定拠出年金','き確定拠出年金','生保解約返戻金'];

let expenses=JSON.parse(localStorage.getItem('kk_expenses')||'[]');
let incomes=JSON.parse(localStorage.getItem('kk_incomes')||'[]');
let assets=JSON.parse(localStorage.getItem('kk_assets')||'[]');
let lastSync=localStorage.getItem('kk_last_sync')||'未同期';
let currentMonth=new Date();
let currentTab='home';
let editingOldEntry=null;
let editingOldIncome=null;
let assetPageIdx=0;
let assetMode='slide';
let compareBaseDate='';
let compareDates=[];

function fmtYen(n){return '¥'+Math.round(n).toLocaleString('ja-JP')}
function fmtDate(s){const d=new Date(s);return(d.getMonth()+1)+'/'+(d.getDate())}
function today(){return new Date().toISOString().split('T')[0]}

function getMonthData(arr){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth()+1;
  return arr.filter(e=>{
    if(!e.date)return false;
    const d=new Date(e.date);
    return d.getFullYear()===y&&(d.getMonth()+1)===m;
  });
}

function calcCatUsed(){
  const used={};
  [...Object.keys(BUDGET),...FIXED_CATS].forEach(k=>used[k]=0);
  getMonthData(expenses).forEach(e=>{if(used[e.cat]!==undefined)used[e.cat]+=Number(e.amount)});
  return used;
}

function calcFixedBalance(){
  const balance={};
  const now=new Date();
  const startYear=2024;
  FIXED_CATS.forEach(cat=>{
    const totalIncome=incomes.filter(e=>e.cat===cat).reduce((a,e)=>a+Number(e.amount),0);
    const totalExpense=expenses.filter(e=>e.cat===cat).reduce((a,e)=>a+Number(e.amount),0);
    const monthsElapsed=(now.getFullYear()-startYear)*12+now.getMonth()+1;
    balance[cat]=(FIXED_AMOUNTS[cat]||0)*monthsElapsed+totalIncome-totalExpense;
  });
  return balance;
}

function syncBarHTML(){
  return`<div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <div class="sync-text" id="sync-text">最終同期 ${lastSync}</div>
    <button class="sync-btn" onclick="syncFromSheet()">同期</button>
  </div>`;
}

function setSyncStatus(s,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(dot)dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  if(txt)txt.textContent=msg;
}

async function syncFromSheet(){
  setSyncStatus('syncing','同期中...');
  try{
    const resp=await fetch(GAS_URL+'?t='+Date.now());
    const data=await resp.json();
    if(data['支出']){expenses=data['支出'].filter(e=>e.date&&e.amount>0);localStorage.setItem('kk_expenses',JSON.stringify(expenses));}
    if(data['収入']){incomes=data['収入'].filter(e=>e.date&&e.amount>0);localStorage.setItem('kk_incomes',JSON.stringify(incomes));}
    if(data['資産']){assets=data['資産'].filter(e=>e.date);localStorage.setItem('kk_assets',JSON.stringify(assets));}
    const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    lastSync=now;localStorage.setItem('kk_last_sync',now);
    setSyncStatus('ok','最終同期 '+now);
    renderCurrent();
  }catch(err){setSyncStatus('error','同期失敗');}
}

async function postToSheet(payload){
  try{await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){}
}

function renderAsset(){
  const sorted=[...assets].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(assetPageIdx>=sorted.length)assetPageIdx=Math.max(0,sorted.length-1);
  document.getElementById('view-asset').innerHTML=`
    <div class="header"><h1>資産</h1></div>
    ${syncBarHTML()}
    <div style="margin-bottom:12px">
      <button class="btn-primary" style="width:100%" onclick="openAssetModal(-1)">＋ 資産を記録</button>
    </div>
    ${sorted.length===0?'<div class="empty-msg">資産記録がありません<br>同期ボタンを押してください</div>':`
    <div class="mode-tabs">
      <div class="mode-tab ${assetMode==='slide'?'active':''}" onclick="setAssetMode('slide')">単体表示</div>
      <div class="mode-tab ${assetMode==='compare'?'active':''}" onclick="setAssetMode('compare')">比較表示</div>
    </div>
    <div id="asset-content"></div>`}`;
  if(sorted.length>0){
    if(assetMode==='slide')renderAssetSlide(sorted);
    else renderAssetCompare(sorted);
  }
}

function renderAssetSlide(sorted){
  const rec=sorted[assetPageIdx];
  const prevRec=sorted[assetPageIdx+1];
  const total=ASSET_KEYS.reduce((a,k)=>a+Number(rec[k]||0),0);
  const prevTotal=prevRec?ASSET_KEYS.reduce((a,k)=>a+Number(prevRec[k]||0),0):null;
  const diff=prevTotal!==null?total-prevTotal:null;
  const idx=assets.indexOf(rec);
  document.getElementById('asset-content').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="assetSlide(1)" style="background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:18px;box-shadow:var(--shadow);${assetPageIdx>=sorted.length-1?'opacity:0.3;pointer-events:none':''}">‹</button>
      <div style="text-align:center">
        <div style="font-size:15px;font-weight:700">${rec.date}</div>
        <div style="font-size:11px;color:var(--text3)">${assetPageIdx+1} / ${sorted.length}件</div>
      </div>
      <button onclick="assetSlide(-1)" style="background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:18px;box-shadow:var(--shadow);${assetPageIdx<=0?'opacity:0.3;pointer-events:none':''}">›</button>
    </div>
    <div class="hero-card accent" style="margin-bottom:12px">
      <div class="hero-label">資産合計</div>
      <div style="font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#fb923c">${fmtYen(total)}</div>
      ${diff!==null?`<div class="hero-sub">前回比 <span style="color:${diff>=0?'#4ade80':'#f87171'}">${diff>=0?'+':''}${fmtYen(diff)}</span></div>`:''}
    </div>
    <div class="list-card">
      ${ASSET_KEYS.map(k=>{
        const val=Number(rec[k]||0);
        const prevVal=prevRec?Number(prevRec[k]||0):null;
        const d=prevVal!==null?val-prevVal:null;
        return`<div class="list-item" style="cursor:default">
          <div class="item-left"><div class="iname">${k}</div></div>
          <div class="item-right">
            <div class="iamt" style="color:var(--text2)">${fmtYen(val)}</div>
            ${d!==null&&d!==0?`<div style="font-size:10px;color:${d>0?'var(--green)':'var(--red)'}">${d>0?'+':''}${fmtYen(d)}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:8px">
      <button class="btn-secondary" style="width:100%" onclick="openAssetModal(${idx})">この記録を編集</button>
    </div>`;
  const content=document.getElementById('asset-content');
  let startX=0;
  content.ontouchstart=e=>{startX=e.touches[0].clientX;};
  content.ontouchend=e=>{const d=startX-e.changedTouches[0].clientX;if(Math.abs(d)>50)assetSlide(d>0?-1:1);};
}

function renderAssetCompare(sorted){
  const baseDateToUse=compareBaseDate||sorted[0].date;
  const baseRec=sorted.find(r=>r.date===baseDateToUse)||sorted[0];
  const compareDatesList=compareDates.length>0?compareDates:[sorted[Math.min(1,sorted.length-1)]?.date].filter(Boolean);
  const compareRecs=compareDatesList.map(d=>sorted.find(r=>r.date===d)).filter(Boolean);
  const cols=[...compareRecs,baseRec];

  document.getElementById('asset-content').innerHTML=`
    <div style="margin-bottom:12px">
      <button class="btn-secondary" style="width:100%;margin-bottom:8px" onclick="openCompareModal()">📅 比較する月を選択</button>
      <div style="font-size:12px;color:var(--text3);text-align:center">基準：${baseDateToUse} ／ 比較：${compareDatesList.length}件</div>
    </div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -16px;padding:0 16px">
      <table style="border-collapse:collapse;width:100%;min-width:${100+90*cols.length}px">
        <thead>
          <tr style="border-bottom:2px solid var(--border)">
            <th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:600;position:sticky;left:0;background:var(--bg);min-width:90px">項目</th>
            ${cols.map((r,ci)=>`<th style="text-align:right;padding:6px 8px;font-size:11px;color:${ci===cols.length-1?'var(--green)':'var(--text2)'};font-weight:600;min-width:90px">${r.date.substring(0,7)}${ci===cols.length-1?'<br><span style="color:var(--green);font-size:10px">基準</span>':''}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${ASSET_KEYS.map(k=>`
            <tr style="border-bottom:1px solid var(--border)">
              <td style="padding:7px 8px;font-size:12px;font-weight:500;position:sticky;left:0;background:var(--bg)">${k}</td>
              ${cols.map((r,ci)=>{
                const val=Number(r[k]||0);
                const baseVal=ci<cols.length-1?Number(baseRec[k]||0):null;
                const d=baseVal!==null?val-baseVal:null;
                return`<td style="text-align:right;padding:7px 8px">
                  <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)">${fmtYen(val)}</div>
                  ${d!==null&&d!==0?`<div style="font-size:10px;color:${d>0?'var(--green)':'var(--red)'}">${d>0?'+':''}${fmtYen(d)}</div>`:''}
                </td>`;
              }).join('')}
            </tr>`).join('')}
          <tr style="border-top:2px solid #1a1a2e">
            <td style="padding:8px;font-size:12px;font-weight:700;position:sticky;left:0;background:var(--bg)">合計</td>
            ${cols.map((r,ci)=>{
              const total=ASSET_KEYS.reduce((a,k)=>a+Number(r[k]||0),0);
              const baseTotal=ci<cols.length-1?ASSET_KEYS.reduce((a,k)=>a+Number(baseRec[k]||0),0):null;
              const d=baseTotal!==null?total-baseTotal:null;
              return`<td style="text-align:right;padding:8px">
                <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:${ci===cols.length-1?'var(--green)':'var(--text)'}">${fmtYen(total)}</div>
                ${d!==null?`<div style="font-size:10px;color:${d>0?'var(--green)':'var(--red)'}">${d>0?'+':''}${fmtYen(d)}</div>`:''}
              </td>`;
            }).join('')}
          </tr>
        </tbody>
      </table>
    </div>`;
}

function openCompareModal(){
  const sorted=[...assets].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const baseSel=document.getElementById('compare-base');
  baseSel.innerHTML=sorted.map(r=>`<option value="${r.date}" ${r.date===compareBaseDate?'selected':''}>${r.date}</option>`).join('');
  const checksDiv=document.getElementById('compare-checks');
  checksDiv.innerHTML=sorted.map(r=>`
    <label style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid var(--border);cursor:pointer">
      <input type="checkbox" value="${r.date}" ${compareDates.includes(r.date)?'checked':''} style="width:16px;height:16px;accent-color:var(--green)">
      <span style="font-size:13px;font-family:'DM Mono',monospace">${r.date}</span>
    </label>`).join('');
  document.getElementById('modal-compare').classList.add('open');
}

function applyCompare(){
  compareBaseDate=document.getElementById('compare-base').value;
  compareDates=Array.from(document.querySelectorAll('#compare-checks input:checked')).map(el=>el.value);
  closeModal('compare');
  const sorted=[...assets].sort((a,b)=>new Date(b.date)-new Date(a.date));
  renderAssetCompare(sorted);
}

function setAssetMode(mode){assetMode=mode;renderAsset();}

function assetSlide(dir){
  const sorted=[...assets].sort((a,b)=>new Date(b.date)-new Date(a.date));
  assetPageIdx=Math.max(0,Math.min(sorted.length-1,assetPageIdx+dir));
  renderAssetSlide(sorted);
}

function renderFixed(){
  const balance=calcFixedBalance();
  const used=calcCatUsed();
  const fixedTotal=Object.values(FIXED_AMOUNTS).reduce((a,b)=>a+b,0);
  const fixedUsedTotal=FIXED_CATS.reduce((a,k)=>a+(used[k]||0),0);
  document.getElementById('view-fixed').innerHTML=`
    <div class="header"><h1>積立・固定費</h1></div>
    <div class="hero-card accent">
      <div class="hero-label">今月の積立合計</div>
      <div style="font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#fb923c">${fmtYen(fixedTotal)}</div>
      <div class="hero-sub">今月の積立支出 ${fmtYen(fixedUsedTotal)}</div>
    </div>
    <div class="section-title">各口座の残高</div>
    ${FIXED_CATS.map(cat=>{
      const monthly=FIXED_AMOUNTS[cat];
      const bal=balance[cat]||0;
      const spent=used[cat]||0;
      const pct=monthly>0?Math.max(0,Math.min(100,Math.round((monthly-spent)/monthly*100))):0;
      const cls=bal<0?'over':bal<monthly?'warn':'ok';
      return`<div class="fixed-balance-item">
        <div class="fixed-balance-name">${cat}</div>
        <div class="fixed-balance-row">
          <div class="fixed-balance-remain ${cls}">${fmtYen(bal)}</div>
          <div class="fixed-balance-detail">月額 ${fmtYen(monthly)} · 今月支出 ${fmtYen(spent)}</div>
        </div>
        <div class="fixed-bar"><div class="fixed-bar-fill ${cls}-bar" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}`;
}

function renderCurrent(){
  if(currentTab==='home')renderHome();
  if(currentTab==='history')renderHistory();
  if(currentTab==='asset')renderAsset();
  if(currentTab==='fixed')renderFixed();
}

function switchTab(t){
  currentTab=t;
  ['home','history','asset','fixed'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===t?'block':'none';
    document.getElementById('tab-'+v).classList.toggle('active',v===t);
  });
  renderCurrent();
}

function changeMonth(d){
  currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);
  renderCurrent();
}

function openModal(id){
  document.getElementById('modal-'+id).classList.add('open');
  const t=today();
  ['exp-date','inc-date'].forEach(fid=>{const el=document.getElementById(fid);if(el)el.value=t;});
}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('open')}

function switchInputType(t){
  ['expense','income'].forEach(v=>{
    document.getElementById('form-'+v).style.display=v===t?'block':'none';
    document.getElementById('type-'+v).classList.toggle('active',v===t);
  });
}

async function addExpense(){
  const amt=parseInt(document.getElementById('exp-amount').value);
  const cat=document.getElementById('exp-cat').value;
  const detail=document.getElementById('exp-detail').value;
  const date=document.getElementById('exp-date').value;
  if(!amt||amt<=0){alert('金額を入力してください');return}
  const entry={amount:amt,cat,detail,date};
  expenses.push(entry);localStorage.setItem('kk_expenses',JSON.stringify(expenses));
  document.getElementById('exp-amount').value='';document.getElementById('exp-detail').value='';
  closeModal('input');renderCurrent();
  await postToSheet({action:'add',...entry});
}

async function addIncome(){
  const amt=parseInt(document.getElementById('inc-amount').value);
  const cat=document.getElementById('inc-cat').value;
  const detail=document.getElementById('inc-detail').value;
  const date=document.getElementById('inc-date').value;
  if(!amt||amt<=0){alert('金額を入力してください');return}
  const entry={amount:amt,cat,detail,date};
  incomes.push(entry);localStorage.setItem('kk_incomes',JSON.stringify(incomes));
  document.getElementById('inc-amount').value='';document.getElementById('inc-detail').value='';
  closeModal('input');renderCurrent();
  await postToSheet({action:'addIncome',...entry});
}

function openEdit(idx){
  const e=expenses[idx];if(!e)return;
  editingOldEntry={...e};
  document.getElementById('edit-idx').value=idx;
  document.getElementById('edit-amount').value=e.amount;
  document.getElementById('edit-cat').value=e.cat;
  document.getElementById('edit-detail').value=e.detail||'';
  document.getElementById('edit-date').value=e.date;
  document.getElementById('modal-edit').classList.add('open');
}

async function saveEdit(){
  const idx=parseInt(document.getElementById('edit-idx').value);
  const amt=parseInt(document.getElementById('edit-amount').value);
  const cat=document.getElementById('edit-cat').value;
  const detail=document.getElementById('edit-detail').value;
  const date=document.getElementById('edit-date').value;
  if(!amt||amt<=0){alert('金額を入力してください');return}
  await postToSheet({action:'delete',...editingOldEntry});
  const entry={amount:amt,cat,detail,date};
  expenses[idx]=entry;localStorage.setItem('kk_expenses',JSON.stringify(expenses));
  await postToSheet({action:'add',...entry});
  closeModal('edit');renderCurrent();
}

async function deleteExpense(){
  const idx=parseInt(document.getElementById('edit-idx').value);
  if(!confirm('この支出を削除しますか？'))return;
  const entry=expenses[idx];
  await postToSheet({action:'delete',...entry});
  expenses.splice(idx,1);localStorage.setItem('kk_expenses',JSON.stringify(expenses));
  closeModal('edit');renderCurrent();
}

function openEditIncome(idx){
  const e=incomes[idx];if(!e)return;
  editingOldIncome={...e};
  document.getElementById('edit-inc-idx').value=idx;
  document.getElementById('edit-inc-amount').value=e.amount;
  document.getElementById('edit-inc-cat').value=e.cat;
  document.getElementById('edit-inc-detail').value=e.detail||'';
  document.getElementById('edit-inc-date').value=e.date;
  document.getElementById('modal-edit-income').classList.add('open');
}

async function saveIncomeEdit(){
  const idx=parseInt(document.getElementById('edit-inc-idx').value);
  const amt=parseInt(document.getElementById('edit-inc-amount').value);
  const cat=document.getElementById('edit-inc-cat').value;
  const detail=document.getElementById('edit-inc-detail').value;
  const date=document.getElementById('edit-inc-date').value;
  if(!amt||amt<=0){alert('金額を入力してください');return}
  await postToSheet({action:'deleteIncome',...editingOldIncome});
  const entry={amount:amt,cat,detail,date};
  incomes[idx]=entry;localStorage.setItem('kk_incomes',JSON.stringify(incomes));
  await postToSheet({action:'addIncome',...entry});
  closeModal('edit-income');renderCurrent();
}

async function deleteIncome(){
  const idx=parseInt(document.getElementById('edit-inc-idx').value);
  if(!confirm('この収入を削除しますか？'))return;
  const entry=incomes[idx];
  await postToSheet({action:'deleteIncome',...entry});
  incomes.splice(idx,1);localStorage.setItem('kk_incomes',JSON.stringify(incomes));
  closeModal('edit-income');renderCurrent();
}

function openAssetModal(idx){
  const isEdit=idx>=0;
  const rec=isEdit?assets[idx]:null;
  document.getElementById('asset-modal-title').textContent=isEdit?'資産を編集':'資産を記録';
  document.getElementById('asset-edit-idx').value=idx;
  document.getElementById('asset-date').value=rec?rec.date:today();
  const container=document.getElementById('asset-fields');
  container.innerHTML=ASSET_KEYS.map(k=>`
    <div class="asset-input-row">
      <div class="asset-input-label">${k}</div>
      <input class="asset-input-field" type="number" id="assetfield-${k}" placeholder="0" inputmode="numeric" value="${rec&&rec[k]?rec[k]:''}">
    </div>`).join('');
  const btnRow=document.getElementById('asset-btn-row');
  btnRow.innerHTML=isEdit
    ?`<button class="btn-danger" onclick="deleteAsset()">削除</button>
       <button class="btn-secondary" onclick="closeModal('asset')">キャンセル</button>
       <button class="btn-primary" onclick="saveAsset()">保存</button>`
    :`<button class="btn-secondary" onclick="closeModal('asset')">キャンセル</button>
       <button class="btn-primary" onclick="saveAsset()">記録する</button>`;
  document.getElementById('modal-asset').classList.add('open');
}

async function saveAsset(){
  const idx=parseInt(document.getElementById('asset-edit-idx').value);
  const date=document.getElementById('asset-date').value;
  if(!date){alert('日付を入力してください');return}
  const record={date};let total=0;
  ASSET_KEYS.forEach(k=>{const v=parseInt(document.getElementById('assetfield-'+k).value)||0;record[k]=v;total+=v;});
  record['合計']=total;
  const isEdit=idx>=0;
  if(isEdit){await postToSheet({action:'deleteAsset',date:assets[idx].date});assets[idx]=record;}
  else{assets.push(record);}
  localStorage.setItem('kk_assets',JSON.stringify(assets));
  closeModal('asset');renderAsset();
  await postToSheet({action:'saveAsset',...record});
}

async function deleteAsset(){
  const idx=parseInt(document.getElementById('asset-edit-idx').value);
  if(!confirm('この資産記録を削除しますか？'))return;
  await postToSheet({action:'deleteAsset',date:assets[idx].date});
  assets.splice(idx,1);localStorage.setItem('kk_assets',JSON.stringify(assets));
  closeModal('asset');renderAsset();
}

renderHome();
syncFromSheet();
</script>
