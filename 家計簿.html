<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<title>家計簿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f0ede8;--text2:#a09890;--text3:#665f58;
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --border:#2e2e2e;--radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:90px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-top:env(safe-area-inset-top,12px)}
.header h1{font-size:18px;font-weight:500}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:var(--bg3);border:none;color:var(--text2);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px}
.month-nav span{font-family:'DM Mono',monospace;font-size:14px;color:var(--text2)}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-radius:10px;margin-bottom:14px;border:0.5px solid var(--border)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{font-size:12px;color:var(--text3);flex:1}
.sync-btn{background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.hero-card{background:var(--bg2);border-radius:16px;padding:18px;margin-bottom:12px;border:0.5px solid var(--border)}
.hero-label{font-size:11px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.hero-amount{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--green);letter-spacing:-.02em}
.hero-amount.warn{color:var(--amber)}
.hero-amount.over{color:var(--red)}
.hero-sub{font-size:11px;color:var(--text3);margin-top:4px}
.progress-track{background:var(--bg4);border-radius:4px;height:5px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.ok-bar{background:var(--green)}.warn-bar{background:var(--amber)}.over-bar{background:var(--red)}
.cards-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mini-card{background:var(--bg2);border-radius:var(--radius);padding:12px;border:0.5px solid var(--border)}
.mini-label{font-size:10px;color:var(--text3);margin-bottom:4px}
.mini-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.section-title{font-size:11px;color:var(--text3);letter-spacing:.1em;margin:16px 0 8px}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.budget-item{background:var(--bg2);border-radius:var(--radius);padding:10px;border:0.5px solid var(--border)}
.budget-item .bname{font-size:11px;color:var(--text3);margin-bottom:3px}
.budget-item .bused{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.budget-item .btotal{font-size:10px;color:var(--text3);margin-top:2px}
.budget-item .bbar{background:var(--bg4);border-radius:2px;height:3px;margin-top:6px;overflow:hidden}
.budget-item .bbar-fill{height:100%;border-radius:2px}
.ok{color:var(--green)}.warn{color:var(--amber)}.over{color:var(--red)}
.list-card{background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border);overflow:hidden;margin-bottom:12px}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.item-left .iname{font-size:13px}
.item-left .icat{font-size:11px;color:var(--text3);margin-top:2px}
.item-right{text-align:right;flex-shrink:0;margin-left:8px}
.item-right .iamt{font-family:'DM Mono',monospace;font-size:13px}
.item-right .idate{font-size:10px;color:var(--text3);margin-top:2px}
.iamt.expense{color:var(--red)}
.iamt.income{color:var(--green)}
.empty-msg{padding:20px;text-align:center;color:var(--text3);font-size:13px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,15,15,.96);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);display:flex;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom,0px))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;color:var(--text3);padding:5px 0}
.tab.active{color:var(--green)}
.tab-icon{font-size:18px}
.tab-label{font-size:10px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s ease;border-top:0.5px solid var(--border);max-height:92vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:var(--text3);margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none}
.form-input:focus{border-color:var(--green)}
.form-select{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none}
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn-primary{flex:1;background:var(--green);color:#000;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.btn-secondary{flex:1;background:var(--bg3);color:var(--text2);border:none;border-radius:12px;padding:13px;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.btn-danger{flex:1;background:#7f1d1d;color:var(--red);border:none;border-radius:12px;padding:13px;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.mode-tabs{display:flex;gap:6px;margin-bottom:14px}
.mode-tab{flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center}
.mode-tab.active{border-color:var(--green);color:var(--green)}
.receipt-area{background:var(--bg3);border:1.5px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px}
.receipt-icon{font-size:28px;margin-bottom:6px}
.receipt-text{font-size:12px;color:var(--text3)}
.ai-result-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border)}
.ai-result-item:last-child{border-bottom:none}
.loading-dots{display:inline-flex;gap:4px}
.loading-dots span{width:6px;height:6px;background:var(--green);border-radius:50%;animation:dot .8s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.3}40%{opacity:1}}
.fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,0px));right:max(16px,calc(50% - 224px));width:50px;height:50px;background:var(--green);border-radius:50%;border:none;cursor:pointer;font-size:26px;color:#000;box-shadow:0 4px 20px rgba(74,222,128,.3);z-index:50;display:flex;align-items:center;justify-content:center}
.asset-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border-radius:10px;border:0.5px solid var(--border);margin-bottom:6px}
.asset-name{font-size:13px}
.asset-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text2)}
.asset-input-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border)}
.asset-input-row:last-child{border-bottom:none}
.asset-input-label{font-size:13px;flex:1}
.asset-input-field{width:130px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;outline:none;text-align:right;-webkit-appearance:none}
.asset-input-field:focus{border-color:var(--green)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg3);border-radius:10px;border:0.5px solid var(--green);margin-top:8px}
.fixed-balance-item{background:var(--bg2);border-radius:var(--radius);padding:12px;border:0.5px solid var(--border);margin-bottom:8px}
.fixed-balance-name{font-size:12px;color:var(--text3);margin-bottom:4px}
.fixed-balance-row{display:flex;justify-content:space-between;align-items:baseline}
.fixed-balance-remain{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
.fixed-balance-detail{font-size:11px;color:var(--text3)}
.fixed-bar{background:var(--bg4);border-radius:2px;height:3px;margin-top:8px;overflow:hidden}
.fixed-bar-fill{height:100%;border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div id="view-home"></div>
  <div id="view-history" style="display:none"></div>
  <div id="view-asset" style="display:none"></div>
  <div id="view-fixed" style="display:none"></div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('home')" id="tab-home">
    <span class="tab-icon">◎</span><span class="tab-label">ホーム</span>
  </button>
  <button class="tab" onclick="switchTab('history')" id="tab-history">
    <span class="tab-icon">≡</span><span class="tab-label">履歴</span>
  </button>
  <button class="tab" onclick="switchTab('asset')" id="tab-asset">
    <span class="tab-icon">◈</span><span class="tab-label">資産</span>
  </button>
  <button class="tab" onclick="switchTab('fixed')" id="tab-fixed">
    <span class="tab-icon">☰</span><span class="tab-label">積立</span>
  </button>
</div>

<button class="fab" onclick="openModal('input')">＋</button>

<!-- 支出・収入入力モーダル -->
<div class="modal-overlay" id="modal-input">
  <div class="modal">
    <div class="modal-title">入力</div>
    <div class="mode-tabs">
      <div class="mode-tab active" onclick="switchInputType('expense')" id="type-expense">支出</div>
      <div class="mode-tab" onclick="switchInputType('income')" id="type-income">収入</div>
      <div class="mode-tab" onclick="switchInputType('receipt')" id="type-receipt">レシート</div>
    </div>
    <!-- 支出フォーム -->
    <div id="form-expense">
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="exp-amount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="exp-cat">
          <option>食料費</option><option>生活費</option><option>その他</option>
          <option>通信費</option><option>光熱費</option><option>保険費</option>
          <option>住居費</option><option>教育費</option>
          <option disabled>── 積立 ──</option>
          <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
          <option>自動車税積立</option><option>車検積立</option>
          <option>固定資産税積立</option><option>自動車保険積立</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">詳細（任意）</label>
        <input class="form-input" type="text" id="exp-detail" placeholder="例：スーパー、Amazon">
      </div>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" type="date" id="exp-date">
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('input')">キャンセル</button>
        <button class="btn-primary" onclick="addExpense()">追加</button>
      </div>
    </div>
    <!-- 収入フォーム -->
    <div id="form-income" style="display:none">
      <div class="form-group">
        <label class="form-label">金額</label>
        <input class="form-input" type="number" id="inc-amount" placeholder="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">入金先</label>
        <select class="form-select" id="inc-cat">
          <option>よ収入</option><option>き収入</option><option>その他収入</option>
          <option>児童手当</option><option>雑収入</option>
          <option disabled>── 積立口座へ ──</option>
          <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
          <option>自動車税積立</option><option>車検積立</option>
          <option>固定資産税積立</option><option>自動車保険積立</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">詳細（任意）</label>
        <input class="form-input" type="text" id="inc-detail" placeholder="例：給与、ボーナス">
      </div>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input class="form-input" type="date" id="inc-date">
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeModal('input')">キャンセル</button>
        <button class="btn-primary" onclick="addIncome()">追加</button>
      </div>
    </div>
    <!-- レシートフォーム -->
    <div id="form-receipt" style="display:none">
      <div class="receipt-area" onclick="document.getElementById('file-inp').click()">
        <div class="receipt-icon">📷</div>
        <div class="receipt-text">レシート写真をタップ</div>
        <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleReceipt(this)">
      </div>
      <div id="ai-loading" style="display:none;text-align:center;padding:16px">
        <div style="color:var(--text3);font-size:13px;margin-bottom:8px">AI解析中...</div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
      <div id="ai-results" style="display:none"></div>
      <div id="paste-area">
        <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px">またはテキストを貼り付け</div>
        <textarea class="form-input" id="paste-text" rows="3" placeholder="Amazon明細などを貼り付け"></textarea>
        <div class="btn-row" style="margin-top:8px">
          <button class="btn-secondary" onclick="closeModal('input')">キャンセル</button>
          <button class="btn-primary" onclick="analyzeText()">解析</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-title">支出を編集</div>
    <input type="hidden" id="edit-idx">
    <div class="form-group">
      <label class="form-label">金額</label>
      <input class="form-input" type="number" id="edit-amount" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="edit-cat">
        <option>食料費</option><option>生活費</option><option>その他</option>
        <option>通信費</option><option>光熱費</option><option>保険費</option>
        <option>住居費</option><option>教育費</option>
        <option disabled>── 積立 ──</option>
        <option>貯蓄</option><option>生命保険積立</option><option>IDECO</option>
        <option>自動車税積立</option><option>車検積立</option>
        <option>固定資産税積立</option><option>自動車保険積立</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">詳細</label>
      <input class="form-input" type="text" id="edit-detail">
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input class="form-input" type="date" id="edit-date">
    </div>
    <div class="btn-row">
      <button class="btn-danger" onclick="deleteEntry()">削除</button>
      <button class="btn-secondary" onclick="closeModal('edit')">キャンセル</button>
      <button class="btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 資産入力モーダル -->
<div class="modal-overlay" id="modal-asset">
  <div class="modal">
    <div class="modal-title">資産を記録</div>
    <div class="form-group">
      <label class="form-label">記録日</label>
      <input class="form-input" type="date" id="asset-date">
    </div>
    <div id="asset-fields" style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:12px"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('asset')">キャンセル</button>
      <button class="btn-primary" onclick="saveAsset()">記録する</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxKuVAihUFNSCI1LxTIssawJDJ1NnaA3Kw5FNguS8cA6oyRxQEN2IKV6DVDS4nHSKe3/exec';
const RESERVE = 20000;

const BUDGET = {
  食料費:83500,生活費:13000,その他:60000,通信費:10000,
  光熱費:38000,保険費:12000,住居費:22000,教育費:20000
};
const FIXED_AMOUNTS = {
  貯蓄:99000,生命保険積立:64000,IDECO:10000,
  自動車税積立:3500,車検積立:7000,固定資産税積立:10500,自動車保険積立:2500
};
const FIXED_CATS = Object.keys(FIXED_AMOUNTS);
const ALL_CATS = [...Object.keys(BUDGET), ...FIXED_CATS];
const ASSET_KEYS = ['現金','貯蓄','生命保険積立','自動車税積立','車検積立','固定資産税積立','自動車保険積立','史絵梨貯金','涼介貯金','き貯金','よ確定拠出年金','き確定拠出年金','生保解約返戻金'];

let expenses = JSON.parse(localStorage.getItem('kk_expenses')||'[]');
let incomes = JSON.parse(localStorage.getItem('kk_incomes')||'[]');
let assets = JSON.parse(localStorage.getItem('kk_assets')||'[]');
let lastSync = localStorage.getItem('kk_last_sync')||'未同期';
let currentMonth = new Date();
let currentTab = 'home';
let editingOldEntry = null;

function fmtYen(n){return '¥'+Math.round(n).toLocaleString('ja-JP')}
function fmtDate(s){const d=new Date(s);return(d.getMonth()+1)+'/'+(d.getDate())}
function today(){return new Date().toISOString().split('T')[0]}

function getMonthData(arr){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth()+1;
  return arr.filter(e=>{
    if(!e.date)return false;
    const d=new Date(e.date);
    return d.getFullYear()===y&&(d.getMonth()+1)===m;
  });
}

function calcCatUsed(){
  const used={};
  ALL_CATS.forEach(k=>used[k]=0);
  getMonthData(expenses).forEach(e=>{if(used[e.cat]!==undefined)used[e.cat]+=Number(e.amount)});
  return used;
}

// 積立残高計算：積立額の累計 + 収入 - 支出（全期間）
function calcFixedBalance(){
  const balance={};
  const now = new Date();
  const startYear = 2024;
  
  FIXED_CATS.forEach(cat=>{
    // 全期間の収入（この口座への入金）
    const totalIncome = incomes
      .filter(e=>e.cat===cat)
      .reduce((a,e)=>a+Number(e.amount),0);
    // 全期間の支出
    const totalExpense = expenses
      .filter(e=>e.cat===cat)
      .reduce((a,e)=>a+Number(e.amount),0);
    // 月次積立額（今月まで）
    const monthsElapsed = (now.getFullYear()-startYear)*12 + now.getMonth() + 1;
    const monthlyAmount = FIXED_AMOUNTS[cat]||0;
    const accumulated = monthlyAmount * monthsElapsed;
    balance[cat] = accumulated + totalIncome - totalExpense;
  });
  return balance;
}

function syncBarHTML(){
  return `<div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <div class="sync-text" id="sync-text">最終同期 ${lastSync}</div>
    <button class="sync-btn" onclick="syncFromSheet()">同期</button>
  </div>`;
}

function setSyncStatus(s,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(dot)dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  if(txt)txt.textContent=msg;
}

async function syncFromSheet(){
  setSyncStatus('syncing','同期中...');
  try{
    const resp=await fetch(GAS_URL+'?t='+Date.now());
    const data=await resp.json();
    if(data['支出']){
      expenses=data['支出'].filter(e=>e.date&&e.amount>0);
      localStorage.setItem('kk_expenses',JSON.stringify(expenses));
    }
    if(data['収入']){
      incomes=data['収入'].filter(e=>e.date&&e.amount>0);
      localStorage.setItem('kk_incomes',JSON.stringify(incomes));
    }
    if(data['資産']){
      // 資産データの変換
      assets=data['資産'].filter(e=>e.date);
      localStorage.setItem('kk_assets',JSON.stringify(assets));
    }
    const now=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    lastSync=now;
    localStorage.setItem('kk_last_sync',now);
    setSyncStatus('ok','最終同期 '+now);
    renderCurrent();
  }catch(err){
    setSyncStatus('error','同期失敗');
  }
}

async function postToSheet(payload){
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }catch(e){}
}

  currentTab=t;
  ['home','history','asset','fixed'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===t?'block':'none';
    document.getElementById('tab-'+v).classList.toggle('active',v===t);
  });
  renderCurrent();
}

function changeMonth(d){
  currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);
  renderCurrent();
}

function openModal(id){

  document.getElementById('edit-idx').value=idx;
  document.getElementById('edit-amount').value=e.amount;
  document.getElementById('edit-cat').value=e.cat;
  document.getElementById('edit-detail').value=e.detail||'';

async function saveEdit(){
  const idx=parseInt(document.getElementById('edit-idx').value);
  const amt=parseInt(document.getElementById('edit-amount').value);
  const cat=document.getElementById('edit-cat').value;
  const detail=document.getElementById('edit-detail').value;
  const date=document.getElementById('edit-date').value;
  if(!amt||amt<=0){alert('金額を入力してください');return}
  await postToSheet({action:'delete',...editingOldEntry});
  const entry={amount:amt,cat,detail,date};
  expenses[idx]=entry;
  localStorage.setItem('kk_expenses',JSON.stringify(expenses));
  await postToSheet({action:'add',...entry});
  closeModal('edit');
  renderCurrent();
}

async function deleteEntry(){
  const idx=parseInt(document.getElementById('edit-idx').value);
  if(!confirm('この支出を削除しますか？'))return;
  const entry=expenses[idx];
  await postToSheet({action:'delete',...entry});
  expenses.splice(idx,1);
  localStorage.setItem('kk_expenses',JSON.stringify(expenses));
  closeModal('edit');
  renderCurrent();
}

async function handleReceipt(input){
  if(!input.files[0])return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL('image/jpeg',0.8).split(',')[1];
      await callReceiptAI(b64,'image/jpeg');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function callReceiptAI(b64,mime){
  document.getElementById('ai-loading').style.display='block';
  document.getElementById('ai-results').style.display='none';
  document.getElementById('paste-area').style.display='none';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`家計簿入力アシスタント。レシート画像から支出を読み取りJSON配列のみ返す。マークダウン不要。カテゴリ：食料費・生活費・その他・通信費・光熱費・保険費・住居費・教育費。形式：[{"detail":"店名や品名","amount":金額数値,"cat":"カテゴリ","date":"YYYY-MM-DD"}]`,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:'このレシートの支出をJSON配列で返してください。日付が読み取れない場合は今日の日付を使用。'}
        ]}]
      })
    });
    const data=await resp.json();
    const text=data.content.map(c=>c.text||'').join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const items=JSON.parse(clean);
    showAiResults(items);
  }catch(err){
    document.getElementById('ai-loading').style.display='none';
    document.getElementById('paste-area').style.display='block';
    alert('画像の解析に失敗しました。テキストで貼り付けてください。');
  }
}

async function analyzeText(){
  const text=document.getElementById('paste-text').value;
  if(!text.trim()){alert('テキストを入力してください');return}
  document.getElementById('ai-loading').style.display='block';
  document.getElementById('ai-results').style.display='none';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`家計簿入力アシスタント。テキストから支出を読み取りJSON配列のみ返す。カテゴリ：食料費・生活費・その他・通信費・光熱費・保険費・住居費・教育費。形式：[{"detail":"説明","amount":数値,"cat":"カテゴリ","date":"YYYY-MM-DD"}] 日付不明なら今日の日付。`,
        messages:[{role:'user',content:text}]
      })
    });
    const data=await resp.json();
    const t=data.content.map(c=>c.text||'').join('');
    const clean=t.replace(/```json|```/g,'').trim();
    const items=JSON.parse(clean);
    showAiResults(items);
  }catch(err){
    document.getElementById('ai-loading').style.display='none';
    alert('解析に失敗しました');
  }
}

function showAiResults(items){
  document.getElementById('ai-loading').style.display='none';
  const el=document.getElementById('ai-results');
  el.style.display='block';
  el.innerHTML=`
    <div style="font-size:12px;color:var(--text3);margin-bottom:8px">AI解析結果</div>
    <div style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:10px">
      ${items.map(item=>`<div class="ai-result-item">
        <div>
          <div style="font-size:13px">${item.detail}</div>
          <div style="font-size:11px;color:var(--text3)">${item.cat} · ${item.date||today()}</div>
        </div>
        <div style="font-family:'DM Mono',monospace;color:var(--red);font-size:13px">${fmtYen(item.amount)}</div>
      </div>`).join('')}
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeModal('input')">キャンセル</button>
      <button class="btn-primary" onclick='bulkAdd(${JSON.stringify(items)})'>追加する</button>
    </div>
  `;
}

async function bulkAdd(items){
  for(const item of items){
    const entry={amount:item.amount,cat:item.cat,detail:item.detail,date:item.date||today()};
    expenses.push(entry);
    await postToSheet({action:'add',...entry});
  }
  localStorage.setItem('kk_expenses',JSON.stringify(expenses));
  closeModal('input');
  renderHome();
}

function openAssetModal(){
  document.getElementById('asset-date').value=today();
  const latest=assets.length>0?assets[assets.length-1]:null;
  const container=document.getElementById('asset-fields');
  container.innerHTML=ASSET_KEYS.map(k=>`
    <div class="asset-input-row">
      <div class="asset-input-label">${k}</div>
      <input class="asset-input-field" type="number" id="assetfield-${k}" placeholder="0" inputmode="numeric" value="${latest&&latest[k]?latest[k]:''}">
    </div>`).join('');
  openModal('asset');
}

async function saveAsset(){
  const date=document.getElementById('asset-date').value;
  if(!date){alert('日付を入力してください');return}
  const record={date};
  let total=0;
  ASSET_KEYS.forEach(k=>{
    const v=parseInt(document.getElementById('assetfield-'+k).value)||0;
    record[k]=v;
    total+=v;
  });
  record['合計']=total;
  assets.push(record);
  localStorage.setItem('kk_assets',JSON.stringify(assets));
  closeModal('asset');
  renderAsset();
  await postToSheet({action:'saveAsset',...record});
}

renderHome();
syncFromSheet();
