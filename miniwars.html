<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ミニウォーズDX</title>
<style>
  :root{
    --bg:#10122a; --panel:#1d2145; --panel2:#2c3a8c;
    --red:#d04a58; --blue:#3b6fe0; --gold:#ffd76a; --txt:#f4f4f4;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    color:var(--txt);touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  #app{display:flex;flex-direction:column;height:100%;}

  #topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:8px 12px;background:linear-gradient(180deg,#262b5c,#1d2145);
    font-size:13px;font-weight:bold;border-bottom:3px solid #000;
    box-shadow:0 2px 8px rgba(0,0,0,.5);z-index:2;}
  #turnbadge{padding:3px 12px;border-radius:4px;background:var(--blue);
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.3);white-space:nowrap;}
  .funds{color:var(--gold);white-space:nowrap;}
  #mutebtn,#menubtn,#homebtn{background:none;border:none;font-size:18px;box-shadow:none;padding:2px 4px;}

  #mapwrap{flex:1;display:flex;touch-action:pan-x pan-y;
    overflow:auto;-webkit-overflow-scrolling:touch;background:
      radial-gradient(ellipse at 50% 30%, #1b1f44 0%, #0c0e22 80%);}
  #mapinner{margin:auto;position:relative;}
  canvas{image-rendering:pixelated;display:block;touch-action:pan-x pan-y;}

  #bottom{background:linear-gradient(180deg,#262b5c,#181b3a);
    border-top:3px solid #000;padding:8px 10px;min-height:118px;z-index:2;}
  #info{font-size:13px;line-height:1.45;min-height:48px;display:flex;
    align-items:center;gap:10px;}
  #info b{color:var(--gold);}
  #info img{height:38px;image-rendering:pixelated;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.6));}
  #btns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  button{font-family:inherit;font-weight:bold;font-size:14px;
    padding:10px 14px;border:none;border-radius:6px;cursor:pointer;
    background:var(--panel2);color:#fff;box-shadow:0 3px 0 #16205c;}
  button:active{transform:translateY(2px);box-shadow:0 1px 0 #16205c;}
  button.warn{background:var(--red);box-shadow:0 3px 0 #6e2230;}
  button.gold{background:var(--gold);color:#3a2c00;box-shadow:0 3px 0 #b08a3e;}
  button:disabled{opacity:.35;}

  #banner{position:fixed;left:0;right:0;top:38%;padding:16px 0;text-align:center;
    font-size:23px;font-weight:900;color:#fff;letter-spacing:.2em;z-index:9;
    background:linear-gradient(90deg,transparent 0%,rgba(0,0,0,.88) 18%,rgba(0,0,0,.88) 82%,transparent 100%);
    text-shadow:0 3px 0 rgba(0,0,0,.6);transform:translateX(-120%);pointer-events:none;}

  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);
    display:flex;justify-content:center;align-items:center;z-index:10;}
  #overlay.hidden{display:none;}
  .dialog{background:var(--panel);border:3px solid var(--gold);
    border-radius:12px;padding:18px;width:min(340px,92vw);text-align:center;
    max-height:86vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    box-shadow:0 12px 40px rgba(0,0,0,.7);animation:pop .25s ease;}
  @keyframes pop{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
  .dialog h2{color:var(--gold);margin-bottom:12px;font-size:21px;letter-spacing:.1em;}
  .dialog p{font-size:13px;line-height:1.7;margin-bottom:14px;text-align:left;}
  .dialog .row{display:flex;flex-direction:column;gap:8px;}
  .dialog button{width:100%;display:flex;align-items:center;gap:10px;
    justify-content:flex-start;padding:9px 12px;text-align:left;}
  .dialog button img{height:30px;image-rendering:pixelated;}
  .dialog button .pr{margin-left:auto;color:var(--gold);white-space:nowrap;}
  .dialog button.gold .pr{color:#7a5b00;}
  .dialog button.center{justify-content:center;text-align:center;}
  .dialog small{font-weight:normal;opacity:.85;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span id="turnbadge">ミニウォーズDX</span>
    <span class="funds">💰 <span id="funds">0</span>G ／ 拠点<span id="props">0</span></span>
    <span>
      <button id="homebtn" onclick="goHome()">🏠</button>
      <button id="menubtn" onclick="openStageSelect(true)">📋</button>
      <button id="mutebtn" onclick="toggleMute()">🔊</button>
    </span>
  </div>
  <div id="mapwrap"><div id="mapinner"><canvas id="cv"></canvas></div></div>
  <div id="bottom">
    <div id="info">「📋」からステージを選んでください</div>
    <div id="btns"></div>
  </div>
</div>

<div id="banner"></div>

<div id="overlay">
  <div class="dialog" id="dialog">
    <h2>ミニウォーズ DX</h2>
    <p>🔵 青軍（あなた）対 🔴 赤軍（CPU）<br>
    ・<b>全20ステージ</b>！マップは毎回手作り＋自動生成で変化、後半ほど広く強大に<br>
    ・ユニット9種類、兵科の相性が勝敗のカギ<br>
    ・ダメージには運がからむ。<b style="color:#ffd76a">クリティカル</b>もあり！<br>
    ・同じ種類の味方に重なると<b>合流</b>してHP回復<br>
    ・砲兵・ロケット砲は移動したターンは撃てない<br>
    ・歩兵・バズーカ兵で都市を占領 → 毎ターン収入<br>
    ・戦闘で経験値！<b style="color:#ffd76a">★ランクアップ</b>で攻防強化<br>
    ・<b style="color:#ffd76a">敵HQの占領</b>か敵全滅で勝利！<br>
    ・🏠ホームでいつでも中断、つづきから再開できます</p>
    <div class="row" id="titleRow"><button class="gold center" onclick="openStageSelect()">▶ ステージをえらぶ</button></div>
  </div>
</div>

  u.exp+=6;

  if(nr>u.rank){u.rank=nr;rankUpFx(u);}
}

  SND.rankup();

const sprCv={}, sprUrl={};
function buildSprites(){
  const SC=6;
  for(const type in PX){
    sprCv[type]=[]; sprUrl[type]=[];
    for(let pid=0;pid<2;pid++){
      const pal={K:"#16161c",S:"#e8b88a",G:"#aeb4bc",W:"#e8e8ee",A:"#9adcf0",
        T:PLAYER_COLOR[pid],t:PLAYER_DARK[pid]};
      const rows=PX[type];
      const c=document.createElement("canvas");
      c.width=rows[0].length*SC; c.height=rows.length*SC;
      const g=c.getContext("2d");
      for(let y=0;y<rows.length;y++)for(let x=0;x<rows[y].length;x++){
        const ch=rows[y][x];
        if(ch==="."||!pal[ch])continue;
        g.fillStyle=pal[ch];
        g.fillRect(x*SC,y*SC,SC,SC);
      }
      sprCv[type][pid]=c;
      sprUrl[type][pid]=c.toDataURL();
    }
  }
}

==================================================== */
let audio=null, muted=false, unlockEl=null;
function toggleMute(){muted=!muted;
  document.getElementById("mutebtn").textContent=muted?"🔇":"🔊";
  bgmSetMute(muted);
  if(!muted)unlockAudio();}
function ac(){if(!audio){const A=window.AudioContext||window.webkitAudioContext;
  try{audio=new A();}catch(e){}}
  if(audio&&audio.state==="suspended")audio.resume();
  return audio;}
function silentWavURL(){
  const n=8000;
  const buf=new ArrayBuffer(44+n);
  const v=new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF");v.setUint32(4,36+n,true);ws(8,"WAVE");
  ws(12,"fmt ");v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,1,true);v.setUint32(24,8000,true);v.setUint32(28,8000,true);
  v.setUint16(32,1,true);v.setUint16(34,8,true);
  ws(36,"data");v.setUint32(40,n,true);
  for(let i=0;i<n;i++)v.setUint8(44+i,128);
  return URL.createObjectURL(new Blob([buf],{type:"audio/wav"}));
}
function unlockAudio(){
  const a=ac();
  if(a&&a.state==="suspended")a.resume();
  if(!unlockEl){
    try{
      unlockEl=document.createElement("audio");
      unlockEl.setAttribute("playsinline","");
      unlockEl.loop=true;
      unlockEl.src=silentWavURL();
    }catch(e){}
  }
  if(unlockEl)unlockEl.play().catch(()=>{});
}
document.addEventListener("pointerdown",unlockAudio,{passive:true});

function tone(freq,dur,type,vol,when){
  const a=ac();if(!a||muted)return;
  const t=a.currentTime+(when||0);
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||"square";o.frequency.value=freq;
  g.gain.setValueAtTime(vol||.12,t);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(a.destination);
  o.start(t);o.stop(t+dur+.02);
}
function noise(dur,vol,fStart,fEnd){
  const a=ac();if(!a||muted)return;
  const t=a.currentTime;
  const len=a.sampleRate*dur;
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=a.createBufferSource();src.buffer=buf;
  const f=a.createBiquadFilter();f.type="lowpass";
  f.frequency.setValueAtTime(fStart||2000,t);
  f.frequency.exponentialRampToValueAtTime(fEnd||200,t+dur);
  const g=a.createGain();
  g.gain.setValueAtTime(vol||.2,t);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.connect(f);f.connect(g);g.connect(a.destination);
  src.start(t);
}

  g.gain.setValueAtTime(vol||.08,when+dur*.72);
  g.gain.exponentialRampToValueAtTime(.0001,when+dur);
  o.connect(g);g.connect(bgmGain);
  o.start(when);o.stop(when+dur+.05);
}
function bgmKick(when){
  const a=ac();if(!a||!bgmGain)return;
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(130,when);
  o.frequency.exponentialRampToValueAtTime(40,when+.12);
  g.gain.setValueAtTime(.15,when);
  g.gain.exponentialRampToValueAtTime(.001,when+.18);
  o.connect(g);g.connect(bgmGain);
  o.start(when);o.stop(when+.22);
}
function bgmSched(){
  if(!bgmPlaying)return;
  const a=ac();if(!a)return;
  const ahead=a.currentTime+.4;
  while(bgmNextT<ahead){
    const[n,beats]=BGM_ML[bgmStep%BGM_ML.length];
    const dur=beats*BGM_BEAT;
    if(n>=0)bgmNote(bgmHz(n),bgmNextT,dur*.88,'square',.07);
    bgmNextT+=dur;bgmStep++;
  }
  while(bgmBassNext<ahead){
    const[bn,bb]=BGM_BASS[bgmBassStep%BGM_BASS.length];
    const bdur=bb*BGM_BEAT;
    bgmNote(bgmHz(bn),bgmBassNext,bdur*.85,'triangle',.07);
    bgmBassNext+=bdur;bgmBassStep++;
  }
  while(bgmKickNext<ahead){
    bgmKick(bgmKickNext);
    bgmKickNext+=BGM_BEAT*2;
  }
  bgmTimer=setTimeout(bgmSched,100);
}
function bgmStart(){
  if(bgmPlaying)return;
  const a=ac();if(!a)return;
  bgmPlaying=true;bgmStep=0;bgmBassStep=0;
  const t=a.currentTime+.12;
  bgmNextT=t;bgmBassNext=t;bgmKickNext=t;
  bgmGain=a.createGain();
  bgmGain.gain.value=muted?0:.75;
  bgmGain.connect(a.destination);
  bgmSched();
}
function bgmStop(){
  bgmPlaying=false;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
  if(bgmGain){
    try{const a=ac();if(a)bgmGain.gain.exponentialRampToValueAtTime(.001,a.currentTime+.4);}catch(e){}
    setTimeout(()=>{try{bgmGain.disconnect();}catch(e){}bgmGain=null;},500);
  }
}
function bgmSetMute(m){
  if(bgmGain)try{bgmGain.gain.setTargetAtTime(m?0:.75,ac().currentTime,.05);}catch(e){}
}

/* ====================================================
   アニメーション・エフェクト
==================================================== */
function pushAnim(steps,done){anims.push({steps,idx:-1,t:0,done});}
function runAnims(dt){
  if(!anims.length)return;
  const a=anims[0];
  if(a.idx<0){a.idx=0;a.t=0;
    if(a.steps.length){const s=a.steps[0];s.onStart&&s.onStart();}}
  while(a.idx<a.steps.length){
    const s=a.steps[a.idx];
    a.t+=dt;
    const p=s.dur>0?Math.min(1,a.t/s.dur):1;
    s.update&&s.update(p);
    if(a.t>=s.dur){a.idx++;a.t=0;
      if(a.idx<a.steps.length){const n=a.steps[a.idx];n.onStart&&n.onStart();}
      continue;}
    break;
  }
  if(a.idx>=a.steps.length){anims.shift();a.done&&a.done();}
}
function addPopup(x,y,text,color){
  popups.push({x,y,text,color:color||"#fff",life:1});

function explode(x,y,color){
  for(let i=0;i<22;i++){
    const ang=Math.random()*6.28,sp=(.6+Math.random()*2.4);
    particles.push({x:x+.5,y:y+.5,
      vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-1,
      life:.5+Math.random()*.45,maxLife:1,
      size:.08+Math.random()*.14,
      color:i%3===0?"#ffd76a":i%3===1?"#ff7a45":(color||"#aaa")});
  }
  shake=7;SND.boom();
}

/* ====================================================
   移動範囲（合流先も含む）
==================================================== */
function moveCost(u,t){
  const mt=UNIT_DEF[u.type].moveType;
  if(mt==="air")return 1;
  return TERRAIN_INFO[t].cost[mt];
}
function canMerge(u,occ){
  return occ.pid===u.pid&&occ.type===u.type&&occ!==u
    &&(occ.hp<MAX_HP||u.hp<MAX_HP);
}
function calcMove(u){
  const def=UNIT_DEF[u.type];
  const dist=new Map(),parent=new Map();
  dist.set(key(u.x,u.y),0);
  const q=[{x:u.x,y:u.y,c:0}];
  while(q.length){
    q.sort((a,b)=>a.c-b.c);
    const cur=q.shift();
    if(cur.c>dist.get(key(cur.x,cur.y)))continue;
    for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=cur.x+dx,ny=cur.y+dy;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS)continue;
      const occ=unitAt(nx,ny);
      if(occ&&occ.pid!==u.pid)continue;
      const c=cur.c+moveCost(u,map[ny][nx]);
      if(c>def.move)continue;
      const k=key(nx,ny);
      if(dist.has(k)&&dist.get(k)<=c)continue;
      dist.set(k,c);parent.set(k,key(cur.x,cur.y));
      q.push({x:nx,y:ny,c});
    }
  }
  const reach=new Set(),merge=new Set();
  for(const k of dist.keys()){
    const[x,y]=k.split(",").map(Number);
    const occ=unitAt(x,y);
    if(occ&&occ!==u){
      if(canMerge(u,occ)){reach.add(k);merge.add(k);}
      continue;
    }
    reach.add(k);
  }
  return{reach,merge,parent,origin:key(u.x,u.y)};
}
function buildPath(md,destKey){
  const path=[];let k=destKey;
  while(k){const[x,y]=k.split(",").map(Number);
    path.unshift({x,y});
    if(k===md.origin)break;
    k=md.parent.get(k);}
  return path;
}
function enemiesInRange(u){
  const[mn,mx]=UNIT_DEF[u.type].range;
  return units.filter(e=>{
    if(e.hp<=0||e.pid===u.pid)return false;
    if(UNIT_DEF[u.type].vs[UNIT_DEF[e.type].cls]<=0)return false;
    const d=Math.abs(e.x-u.x)+Math.abs(e.y-u.y);
    return d>=mn&&d<=mx;
  });
}

/* ====================================================
   戦闘（相性＋ランク補正＋運＋クリティカル）
==================================================== */
function baseDmg(a,d,aHp){
  const mult=UNIT_DEF[a.type].vs[UNIT_DEF[d.type].cls];
  const tdef=UNIT_DEF[d.type].cls==="air"?0:TERRAIN_INFO[map[d.y][d.x]].def;
  return effAtk(a)*mult*(aHp/MAX_HP)-(tdef+RANKS[d.rank].def)*0.5;
}
function rollDmg(a,d,aHp){
  let v=baseDmg(a,d,aHp);
  v*=0.9+Math.random()*0.2;          // ±10%の運
  let crit=false;
  if(Math.random()<0.08){v*=1.4;crit=true;} // 8%でクリティカル
  return{dmg:Math.max(1,Math.round(v)),crit};
}
function performAttack(a,d,after){
  const roll=rollDmg(a,d,a.hp);
  const dmg=roll.dmg;
  const dHpAfter=d.hp-dmg;
  const dist=Math.abs(a.x-d.x)+Math.abs(a.y-d.y);
  let counter=0,cCrit=false;
  const cm=UNIT_DEF[d.type].vs[UNIT_DEF[a.type].cls];
  if(dHpAfter>0&&dist===1&&UNIT_DEF[d.type].range[0]===1&&cm>0){
    const atdef=UNIT_DEF[a.type].cls==="air"?0:TERRAIN_INFO[map[a.y][a.x]].def;
    let cv=(effAtk(d)*cm*(dHpAfter/MAX_HP)*0.7
      -(atdef+RANKS[a.rank].def)*0.5);
    cv*=0.9+Math.random()*0.2;
    if(Math.random()<0.08){cv*=1.4;cCrit=true;}
    counter=Math.max(1,Math.round(cv));
  }
  const aHpAfter=a.hp-counter;
  const aExp=dmg+(dHpAfter<=0?8:0);
  const dExp=counter>0?counter+(aHpAfter<=0?8:0):0;
  const aRankUp=aHpAfter>0&&rankFor(a.exp+aExp)>a.rank;
  const dRankUp=dHpAfter>0&&dExp>0&&rankFor(d.exp+dExp)>d.rank;
  const dirX=Math.sign(d.x-a.x),dirY=Math.sign(d.y-a.y);
  const steps=[];
  steps.push({dur:150,onStart:()=>roll.crit?SND.crit():SND.shot(),
    update:p=>{const k=Math.sin(p*Math.PI)*.34;
      a.px=a.x+dirX*k;a.py=a.y+dirY*k;}});
  steps.push({dur:280,onStart:()=>{
    a.px=a.x;a.py=a.y;
    d.hp=dHpAfter;d.flash=1;shake=Math.max(shake,roll.crit?6:4);
    addPopup(d.x,d.y,"-"+dmg,roll.crit?"#ffd76a":"#ff6b5e");
    if(roll.crit)addPopup(d.x,d.y-0.55,"クリティカル！","#ffd76a");
    if(dHpAfter<=0){delete captureProgress[key(d.x,d.y)];}
  }});
  if(dHpAfter<=0){
    steps.push({dur:420,onStart:()=>{explode(d.x,d.y,PLAYER_COLOR[d.pid]);}});
  }else if(counter>0){
    steps.push({dur:150,onStart:()=>cCrit?SND.crit():SND.shot(),
      update:p=>{const k=Math.sin(p*Math.PI)*.3;
        d.px=d.x-dirX*k;d.py=d.y-dirY*k;}});
    steps.push({dur:280,onStart:()=>{
      d.px=d.x;d.py=d.y;
      a.hp=aHpAfter;a.flash=1;shake=Math.max(shake,cCrit?6:3);
      addPopup(a.x,a.y,"-"+counter,cCrit?"#ffd76a":"#ff6b5e");
      if(cCrit)addPopup(a.x,a.y-0.55,"クリティカル！","#ffd76a");
    }});
    if(aHpAfter<=0){
      steps.push({dur:420,onStart:()=>{explode(a.x,a.y,PLAYER_COLOR[a.pid]);}});
    }
  }
  steps.push({dur:180,onStart:()=>{
    if(aHpAfter>0){a.exp+=aExp;addPopup(a.x,a.y,"EXP+"+aExp,"#9ad6ff");}
    if(dHpAfter>0&&dExp>0){d.exp+=dExp;addPopup(d.x,d.y,"EXP+"+dExp,"#9ad6ff");}
  }});
  if(aRankUp)steps.push({dur:780,onStart:()=>{a.rank=rankFor(a.exp);rankUpFx(a);}});
  if(dRankUp)steps.push({dur:780,onStart:()=>{d.rank=rankFor(d.exp);rankUpFx(d);}});
  pushAnim(steps,()=>{
    units=units.filter(u=>u.hp>0);
    const m=UNIT_DEF[a.type].vs[UNIT_DEF[d.type].cls];
    let msg=`${UNIT_DEF[a.type].name}の攻撃！ <b>${dmg}</b>ダメージ`;
    if(roll.crit)msg+="<b>（クリティカル！）</b>";
    else if(m>=1.2)msg+="（効果バツグン！）";
    if(dHpAfter<=0)msg+=" → 撃破！";
    else if(counter>0){msg+=`／反撃で<b>${counter}</b>被弾`;
      if(aHpAfter<=0)msg+=" → 撃破された！";}
    if(aRankUp)msg+=`<br>🎖️ ${PLAYER_NAME[a.pid]}の${UNIT_DEF[a.type].name}が<b>${RANKS[a.rank].name}</b>に昇格！`;
    if(dRankUp)msg+=`<br>🎖️ ${PLAYER_NAME[d.pid]}の${UNIT_DEF[d.type].name}が<b>${RANKS[d.rank].name}</b>に昇格！`;
    after&&after(msg);
  });
}
function tryCapture(u){
  const t=map[u.y][u.x];
  if(!UNIT_DEF[u.type].canCapture)return null;
  if(!isProp(t))return null;
  if(getOwner(u.x,u.y)===u.pid)return null;
  const k=key(u.x,u.y);
  let cp=captureProgress[k];
  if(!cp||cp.pid!==u.pid)cp={pid:u.pid,amount:0};
  cp.amount+=u.hp;
  if(cp.amount>=CAPTURE_NEED){
    delete captureProgress[k];
    setOwner(u.x,u.y,u.pid);
    SND.capture();
    addPopup(u.x,u.y,"占領！","#ffd76a");
    gainCaptureExp(u);
    if(t===T.HQ){gameOver(u.pid);return"HQ占領！";}
    return TERRAIN_INFO[t].name+"を占領した！";
  }
  captureProgress[k]=cp;
  SND.select();
  addPopup(u.x,u.y,cp.amount+"/"+CAPTURE_NEED,"#ffd76a");
  return`占領中… ${cp.amount}/${CAPTURE_NEED}`;
}
function doMerge(u,t){
  t.hp=Math.min(MAX_HP,u.hp+t.hp);
  t.exp=Math.max(t.exp,u.exp);
  const nr=rankFor(t.exp);
  if(nr>t.rank){t.rank=nr;rankUpFx(t);}
  t.acted=true;t.flash=1;
  u.hp=0;
  units=units.filter(x=>x.hp>0);
  SND.capture();
  addPopup(t.x,t.y,"合流！","#7dff9a");
  finishAction(`${UNIT_DEF[t.type].name}が合流しました（HP ${t.hp}）`);
}

function beginTurn(pid){
  let income=0;
  for(const k in owner)if(owner[k]===pid)income+=1000;
  funds[pid]+=income;
  for(const u of units)if(u.pid===pid)u.acted=false;
  for(const u of units){
    if(u.pid!==pid)continue;
    const t=map[u.y][u.x];
    if(isProp(t)&&getOwner(u.x,u.y)===pid&&u.hp<MAX_HP){
      u.hp=Math.min(MAX_HP,u.hp+4);
      addPopup(u.x,u.y,"+4","#7dff9a");
    }
  }
}
function endTurn(){
  if(ended)return;
  sel=null;mode="idle";moveData=null;setBtns([]);
  if(turn===BLUE){
    turn=RED;beginTurn(RED);updateTop();turnBusy=true;

/* ====================================================
   CPU（赤軍）AI
==================================================== */
let aiList=[];
function aiStart(){
  aiList=units.filter(u=>u.pid===RED&&u.hp>0);
  aiNext();
}
function aiNext(){
  if(ended)return;
  const u=aiList.shift();
  if(!u){aiProduce();return;}
  if(u.hp<=0){aiNext();return;}
  aiActUnit(u,()=>setTimeout(aiNext,150));
}
function aiActUnit(u,next){
  ensureVisible(u.x,u.y);
  let tg=enemiesInRange(u);
  if(tg.length){
    tg.sort((a,b)=>(baseDmg(u,b,u.hp)-b.hp*0.5)-(baseDmg(u,a,u.hp)-a.hp*0.5));
    ensureVisible(tg[0].x,tg[0].y);
    performAttack(u,tg[0],msg=>{u.acted=true;updateUI(msg);
      if(checkEnded())return;next();});
    return;
  }
  const md=calcMove(u);
  const rng=UNIT_DEF[u.type].range;
  let best=null,bestScore=-1e9;
  for(const k of md.reach){
    if(md.merge.has(k))continue;
    const[x,y]=k.split(",").map(Number);
    let score=0;
    const t=map[y][x];
    if(UNIT_DEF[u.type].canCapture&&isProp(t)&&getOwner(x,y)!==RED)score+=200;
    let nd=99;
    for(const e of units)if(e.pid===BLUE&&e.hp>0)
      nd=Math.min(nd,Math.abs(e.x-x)+Math.abs(e.y-y));
    if(isIndirect(u)){
      if(nd>=rng[0]&&nd<=rng[1])score+=80;
      else if(nd<rng[0])score-=30;
      else score-=nd*5;
    }else{
      score-=nd*5;
    }
    score-=(Math.abs(HQ_POS[BLUE].x-x)+Math.abs(HQ_POS[BLUE].y-y))*2;
    if(score>bestScore){bestScore=score;best=k;}
  }
  const finish=()=>{
    if(!isIndirect(u)){
      let tg2=enemiesInRange(u);
      if(tg2.length){
        tg2.sort((a,b)=>(baseDmg(u,b,u.hp)-b.hp*0.5)-(baseDmg(u,a,u.hp)-a.hp*0.5));
        ensureVisible(tg2[0].x,tg2[0].y);
        performAttack(u,tg2[0],msg=>{u.acted=true;updateUI(msg);
          if(checkEnded())return;next();});
        return;
      }
    }
    const c=tryCapture(u);
    if(c)updateUI("赤軍："+c);
    u.acted=true;
    if(checkEnded())return;
    next();
  };
  if(best&&best!==md.origin){
    const path=buildPath(md,best);
    const[x,y]=best.split(",").map(Number);
    u.x=x;u.y=y;ensureVisible(x,y);
    animateMove(u,path,finish);
  }else finish();
}
function aiPickType(){
  const blueHasAir=units.some(u=>u.pid===BLUE&&u.hp>0&&UNIT_DEF[u.type].cls==="air");
  const pool=[];
  const add=(t,w)=>{if(funds[RED]>=UNIT_DEF[t].cost)for(let i=0;i<w;i++)pool.push(t);};
  if(blueHasAir)add("aa",6);
  add("tank",4);add("mech",3);add("inf",3);add("recon",2);
  add("art",2);add("heli",2);add("htank",2);add("rocket",1);
  if(!pool.length&&funds[RED]>=1000)pool.push("inf");
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
function aiProduce(){
  if(ended)return;
  const spots=[];
  for(const k in owner){
    if(owner[k]!==RED)continue;
    const[x,y]=k.split(",").map(Number);
    const t=map[y][x];
    if((t===T.FACTORY||t===T.HQ)&&!unitAt(x,y))spots.push({x,y});
  }
  for(const s of spots){
    const type=aiPickType();
    if(type){
      funds[RED]-=UNIT_DEF[type].cost;
      const nu=mkUnit(type,RED,s.x,s.y);nu.acted=true;units.push(nu);
      addPopup(s.x,s.y,"生産","#fff");
    }
  }
  setTimeout(()=>{if(!checkEnded())endTurn();},450);
}

function checkEnded(){
  if(ended)return true;
  const blue=units.some(u=>u.pid===BLUE&&u.hp>0);
  const red=units.some(u=>u.pid===RED&&u.hp>0);
  const blueCanBuy=funds[BLUE]>=1000&&Object.values(owner).includes(BLUE);
  const redCanBuy=funds[RED]>=1000&&Object.values(owner).includes(RED);
  if(!blue&&!blueCanBuy){gameOver(RED);return true;}
  if(!red&&!redCanBuy){gameOver(BLUE);return true;}
  return false;
}
function gameOver(winner){
  if(ended)return;ended=true;
  clearSave();
  bgmStop();
  if(winner===BLUE){saveStageScore(currentStage,turnCount);}
  else{cleared.add(currentStage);}
  setTimeout(()=>{
    const d=document.getElementById("dialog");
    let btns="";
    if(winner===BLUE){
      if(currentStage+1<STAGES.length)
        btns+=`<button class="gold center" onclick="startGame(${currentStage+1})">▶ 次のステージへ</button>`;
      btns+=`<button class="center" onclick="startGame(${currentStage})">もう一度遊ぶ</button>`;
    }else{
      btns+=`<button class="gold center" onclick="startGame(${currentStage})">🔁 再挑戦</button>`;
    }
    btns+=`<button class="center" onclick="openStageSelect()">ステージ選択へ</button>`;
    d.innerHTML=`<h2>${winner===BLUE?"🎉 勝利！":"💀 敗北…"}</h2>
      <p style="text-align:center">${PLAYER_NAME[winner]}の勝ちです（DAY ${turnCount}）</p>

}

/* ====================================================
   入力（タップ／ドラッグ／ピンチズーム）
==================================================== */
let downX=0,downY=0,downActive=false;
const activePointers=new Map();
let pinchStartDist=0,pinchStartTile=TILE;
function pointerDist(){
  const pts=[...activePointers.values()];
  return Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
}
function pointerMid(){
  const pts=[...activePointers.values()];
  return{x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
}
cv.addEventListener("pointerdown",e=>{
  activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size===2){
    downActive=false;
    pinchStartDist=pointerDist();
    pinchStartTile=TILE;
  }else if(activePointers.size===1){
    downX=e.clientX;downY=e.clientY;downActive=true;
  }
});
cv.addEventListener("pointermove",e=>{
  if(activePointers.has(e.pointerId))activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size===2){
    if(pinchStartDist>10){
      const dist=pointerDist();
      const newTile=clampTile(Math.round(pinchStartTile*(dist/pinchStartDist)));
      if(newTile!==TILE){
        const mid=pointerMid();
        applyZoomAtPoint(newTile,mid.x,mid.y);
      }
    }
    return;
  }
  if(!downActive)return;
  if(Math.hypot(e.clientX-downX,e.clientY-downY)>10)downActive=false;
});
function endPointer(e){
  const wasPinching=activePointers.size>=2;
  activePointers.delete(e.pointerId);
  if(activePointers.size<2)pinchStartDist=0;
  return wasPinching;
}
cv.addEventListener("pointerup",e=>{
  const wasPinching=endPointer(e);
  if(wasPinching){downActive=false;return;}
  if(!downActive)return;
  downActive=false;
  if(busy())return;
  const r=cv.getBoundingClientRect();
  const x=Math.floor((e.clientX-r.left)/TILE);
  const y=Math.floor((e.clientY-r.top)/TILE);
  if(x<0||y<0||x>=COLS||y>=ROWS)return;
  handleTap(x,y);
});
cv.addEventListener("pointercancel",e=>{endPointer(e);downActive=false;});
function terrainLine(u){
  const ti=TERRAIN_INFO[map[u.y][u.x]];
  const o=getOwner(u.x,u.y);
  if(UNIT_DEF[u.type].cls==="air")
    return`📍${ti.name}（飛行中は地形効果なし）`;
  let s=`📍${ti.name}　防御★${ti.def}`;
  if(o!==null)s+=`（${PLAYER_NAME[o]}領）`;
  return s;
}
function handleTap(x,y){
  if(mode==="attack"){
    const t=attackTargets.find(u=>u.x===x&&u.y===y);
    if(t){
      const u=sel.unit;
      mode="anim";setBtns([]);ensureVisible(t.x,t.y);
      performAttack(u,t,msg=>{u.acted=true;finishAction(msg);});
    }else{SND.cancel();}
    return;
  }
  if(mode==="acted"||mode==="mergeAsk"){
    // 行動前なら他のユニットをタップして選び直せる（移動は取り消し）
    const u2=unitAt(x,y);
    if(u2&&u2.pid===BLUE&&!u2.acted){
      undoPending();
      selectUnit(u2);
    }else SND.cancel();
    return;
  }
  if(mode==="move"&&moveData&&moveData.reach.has(key(x,y))){
    const u=sel.unit;
    const ox=u.x,oy=u.y;
    const k=key(x,y);
    if(moveData.merge.has(k)){
      // 合流は確認してから（誤タップ防止）
      const target=unitAt(x,y);
      const path=buildPath(moveData,k);
      sel={unit:u,ox,oy};moveData=null;mode="mergeAsk";
      updateUI(`🤝 <b>${UNIT_DEF[u.type].name}</b>を合流させますか？<br><small>（HPを合わせて回復／合流後は行動済みになります）</small>`);
      setBtns([
        {label:"🤝 合流する",gold:true,fn:()=>{
          mode="anim";setBtns([]);
          u.x=x;u.y=y;ensureVisible(x,y);
          animateMove(u,path,()=>doMerge(u,target));
        }},
        {label:"やめる",fn:()=>{SND.cancel();cancelSel();}},
      ]);
      return;
    }
    const moved=k!==moveData.origin;
    const path=buildPath(moveData,k);
    u.x=x;u.y=y;ensureVisible(x,y);
    mode="anim";setBtns([]);
    animateMove(u,path,()=>afterMove(u,moved,ox,oy));
    return;
  }
  const u=unitAt(x,y);
  if(u&&u.pid===BLUE&&!u.acted){
    selectUnit(u);
  }else if(u&&u.pid===RED){
    SND.select();
    cancelSel();
    const ud=UNIT_DEF[u.type];
    const stars=u.rank?` <span style="color:#ffd76a">${"★".repeat(u.rank)}</span>`:"";
    const rngTxt=isIndirect(u)?`／射程${ud.range[0]}-${ud.range[1]}`:"";
    updateUI(`<img src="${sprUrl[u.type][RED]}">
      <span><b style="color:#ff8a92">敵${ud.name}</b>${stars} HP${u.hp}/${MAX_HP}　攻撃${effAtk(u)}${rngTxt}／移動${ud.move}<br>
      <small>${ud.desc}　${terrainLine(u)}</small></span>`);
  }else{
    cancelSel();
    const t=map[y][x];const ti=TERRAIN_INFO[t];
    let html=`<span><b>${ti.name}</b>　防御 ★${ti.def}`;
    const o=getOwner(x,y);
    if(o!==null)html+=`（${PLAYER_NAME[o]}領）`;
    html+="</span>";
    updateUI(html);
    if((t===T.FACTORY||t===T.HQ)&&o===BLUE&&!unitAt(x,y)){
      openProduce(x,y);
    }
  }
}
function selectUnit(u){
  SND.select();
  sel={unit:u};mode="move";moveData=calcMove(u);
  const ud=UNIT_DEF[u.type];
  const rk=RANKS[u.rank],next=RANKS[u.rank+1];
  const stars=u.rank?` <span style="color:#ffd76a">${"★".repeat(u.rank)}</span>`:"";
  const rngTxt=isIndirect(u)?`／射程${ud.range[0]}-${ud.range[1]}`:"";
  updateUI(`<img src="${sprUrl[u.type][BLUE]}">
    <span><b>${ud.name}</b>${stars} HP${u.hp}/${MAX_HP}　攻撃${effAtk(u)}${rngTxt}／移動${ud.move}<br>
    <small>${rk.name}　EXP ${u.exp}${next?`（次まで${next.exp-u.exp}）`:"（最高）"}　${terrainLine(u)}</small></span>`);
  setBtns([{label:"ここで行動",fn:()=>{mode="anim";afterMove(u,false,u.x,u.y);}},
           {label:"選択解除",fn:cancelSel}]);
}
function undoPending(){
  if(sel&&sel.unit&&sel.ox!==undefined){
    const u=sel.unit;
    u.x=sel.ox;u.y=sel.oy;u.px=sel.ox;u.py=sel.oy;
  }
  sel=null;moveData=null;attackTargets=[];mode="idle";setBtns([]);
}
function animateMove(u,path,after){
  if(path.length<2){u.px=u.x;u.py=u.y;after&&after();return;}
  const steps=[];
  for(let i=1;i<path.length;i++){
    const a=path[i-1],b=path[i];
    steps.push({dur:105,onStart:()=>SND.step(),
      update:p=>{u.px=a.x+(b.x-a.x)*p;u.py=a.y+(b.y-a.y)*p;}});
  }
  pushAnim(steps,()=>{u.px=u.x;u.py=u.y;after&&after();});
}
function afterMove(u,moved,ox,oy){
  sel={unit:u,ox,oy,moved};moveData=null;
  const canFire=!isIndirect(u)||!moved;
  attackTargets=canFire?enemiesInRange(u):[];
  const cap=canCaptureHere(u);
  const btns=[];
  if(attackTargets.length)btns.push({label:"⚔️ 攻撃",warn:true,fn:()=>{
    mode="attack";updateUI("攻撃する敵（赤色のマス）をタップ");
    setBtns([{label:"やめる",fn:()=>{afterMove(u,moved,ox,oy);}}]);}});
  if(cap)btns.push({label:"🚩 占領",gold:true,fn:()=>{
    const m=tryCapture(u);u.acted=true;finishAction(m||"");}});
  btns.push({label:"待機",fn:()=>{u.acted=true;finishAction("待機しました");}});
  btns.push({label:moved?"↩ 戻る":"やめる",fn:()=>{
    u.x=ox;u.y=oy;u.px=ox;u.py=oy;SND.cancel();cancelSel();}});
  mode="acted";
  let hint="行動を選んでください <small>（他のユニットをタップで選び直しOK）</small>";
  if(isIndirect(u)&&moved)hint+="<br><small>（移動したターンは砲撃できません）</small>";
  updateUI(hint);
  setBtns(btns);
}
function canCaptureHere(u){
  const t=map[u.y][u.x];
  return UNIT_DEF[u.type].canCapture&&isProp(t)&&getOwner(u.x,u.y)!==u.pid;
}
function finishAction(msg){
  sel=null;mode="idle";moveData=null;attackTargets=[];
  updateUI(msg);setBtns([]);updateTop();
  if(ended)return;
  if(checkEnded())return;
  autosave();
  const remain=units.filter(u=>u.pid===BLUE&&u.hp>0&&!u.acted).length;
  if(remain===0)updateUI(msg+"<br><small>全ユニット行動済み。「ターン終了」を押してください</small>");
}
function cancelSel(){sel=null;mode="idle";moveData=null;attackTargets=[];
  setBtns([]);updateUI("マスをタップしてください");}
function goHome(){
  bgmStop();
  ended=true;
  anims=[];particles=[];popups=[];rings=[];
  sel=null;mode="idle";moveData=null;attackTargets=[];
  setBtns([]);
  openStageSelect(false);
}

/* ====================================================
   描画
==================================================== */
let zoomFactor=1;
const MIN_ZOOM=0.55,MAX_ZOOM=2.4;
function baseTileFor(wrap){return Math.max(30,Math.min(46,Math.floor(wrap.clientWidth/8)));}
function clampTile(t){
  const wrap=document.getElementById("mapwrap");
  const base=baseTileFor(wrap);
  return Math.max(Math.round(base*MIN_ZOOM),Math.min(Math.round(base*MAX_ZOOM),t));
}
function resize(resetZoom){
  const wrap=document.getElementById("mapwrap");
  DPR=Math.min(2,window.devicePixelRatio||1);
  if(resetZoom)zoomFactor=1;
  TILE=clampTile(Math.round(baseTileFor(wrap)*zoomFactor));
  cv.width=TILE*COLS*DPR;cv.height=TILE*ROWS*DPR;
  cv.style.width=TILE*COLS+"px";cv.style.height=TILE*ROWS+"px";
  terrCv.width=cv.width;terrCv.height=cv.height;
  terrainDirty=true;
}
window.addEventListener("resize",()=>{resize(false);});

// ピンチズーム：2本指の中点を画面上の同じ位置に保ったまま拡大縮小する
function applyZoomAtPoint(newTile,clientX,clientY){
  const wrap=document.getElementById("mapwrap");
  const rect=wrap.getBoundingClientRect();
  const localX=clientX-rect.left,localY=clientY-rect.top;
  const oldTile=TILE;
  const contentX=wrap.scrollLeft+localX,contentY=wrap.scrollTop+localY;
  TILE=newTile;
  zoomFactor=TILE/baseTileFor(wrap);
  cv.width=TILE*COLS*DPR;cv.height=TILE*ROWS*DPR;
  cv.style.width=TILE*COLS+"px";cv.style.height=TILE*ROWS+"px";
  terrCv.width=cv.width;terrCv.height=cv.height;
  terrainDirty=true;
  const ratio=newTile/oldTile;
  wrap.scrollLeft=Math.max(0,contentX*ratio-localX);
  wrap.scrollTop=Math.max(0,contentY*ratio-localY);
}

/* ====================================================
   マップスクロール（カメラ）
==================================================== */
function centerOn(x,y,instant){
  const wrap=document.getElementById("mapwrap");
  const px=(x+0.5)*TILE,py=(y+0.5)*TILE;
  const nx=Math.max(0,Math.min(Math.max(0,wrap.scrollWidth-wrap.clientWidth),px-wrap.clientWidth/2));
  const ny=Math.max(0,Math.min(Math.max(0,wrap.scrollHeight-wrap.clientHeight),py-wrap.clientHeight/2));
  wrap.scrollTo({left:nx,top:ny,behavior:instant?"auto":"smooth"});
}
function ensureVisible(x,y){
  const wrap=document.getElementById("mapwrap");
  const margin=TILE*1.3;
  const px=(x+0.5)*TILE,py=(y+0.5)*TILE;
  const left=wrap.scrollLeft,top=wrap.scrollTop;
  const w=wrap.clientWidth,h=wrap.clientHeight;
  if(px>=left+margin&&px<=left+w-margin&&py>=top+margin&&py<=top+h-margin)return;
  centerOn(x,y);
}

function rseed(x,y){let n=x*374761393+y*668265263;
  n=(n^(n>>13))*1274126177;return((n^(n>>16))>>>0)/4294967295;}
function inMap(x,y){return x>=0&&y>=0&&x<COLS&&y<ROWS;}
function tileAt(x,y){return inMap(x,y)?map[y][x]:-1;}

function renderTerrain(){
  const g=terrCv.getContext("2d");
  g.setTransform(DPR,0,0,DPR,0,0);
  g.imageSmoothingEnabled=false;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=map[y][x];
    const px=x*TILE,py=y*TILE,S=TILE;
    if(t===T.RIVER){
      g.fillStyle=(x+y)%2===0?"#4a8fd4":"#458ace";
      g.fillRect(px,py,S,S);
      g.fillStyle="#8cc4ee";
      for(let i=0;i<3;i++){
        const r1=rseed(x*5+i,y*3),r2=rseed(x*2,y*7+i);
        g.fillRect(px+r1*(S-8)+2,py+r2*(S-6)+3,S*.2,2);
      }
      g.fillStyle="#bfe2f5";
      if(tileAt(x,y-1)!==T.RIVER)g.fillRect(px,py,S,2);
      if(tileAt(x,y+1)!==T.RIVER)g.fillRect(px,py+S-2,S,2);
      if(tileAt(x-1,y)!==T.RIVER)g.fillRect(px,py,2,S);
      if(tileAt(x+1,y)!==T.RIVER)g.fillRect(px+S-2,py,2,S);
      continue;
    }
    g.fillStyle=(x+y)%2===0?"#7ec850":"#76bf4a";
    g.fillRect(px,py,S,S);
    for(let i=0;i<3;i++){
      const r1=rseed(x*3+i,y),r2=rseed(x,y*3+i);
      if(rseed(x+i,y+i)<.6){
        g.fillStyle="#5fa53c";
        g.fillRect(px+r1*(S-4)+1,py+r2*(S-4)+1,2,2);
      }
    }
    if(t===T.ROAD){
      const isRiv=(dx,dy)=>tileAt(x+dx,y+dy)===T.RIVER;
      const vBridge=isRiv(-1,0)&&isRiv(1,0);
      const hBridge=isRiv(0,-1)&&isRiv(0,1);
      if(vBridge||hBridge){
        g.fillStyle="#4a8fd4";g.fillRect(px,py,S,S);
        g.fillStyle="#c9a86b";
        if(vBridge){g.fillRect(px+S*.18,py,S*.64,S);
          g.fillStyle="#8a6f44";
          g.fillRect(px+S*.18,py,3,S);g.fillRect(px+S*.82-3,py,3,S);}
        else{g.fillRect(px,py+S*.18,S,S*.64);
          g.fillStyle="#8a6f44";
          g.fillRect(px,py+S*.18,S,3);g.fillRect(px,py+S*.82-3,S,3);}
      }else{
        const conn=(dx,dy)=>{const nt=tileAt(x+dx,y+dy);
          return nt===T.ROAD||isProp(nt);};
        g.fillStyle="#d8c08a";
        const w=S*.46,o=(S-w)/2;
        g.fillRect(px+o,py+o,w,w);
        if(conn(1,0))g.fillRect(px+o,py+o,S-o,w);
        if(conn(-1,0))g.fillRect(px,py+o,o+w,w);
        if(conn(0,1))g.fillRect(px+o,py+o,w,S-o);
        if(conn(0,-1))g.fillRect(px+o,py,w,o+w);
        g.fillStyle="#efe2b8";
        g.fillRect(px+S*.44,py+S*.44,S*.12,S*.12);
      }
    }else if(t===T.FOREST){
      drawTree(g,px+S*.14,py+S*.1,S*.5);
      drawTree(g,px+S*.42,py+S*.32,S*.55);
    }else if(t===T.MTN){
      g.fillStyle="rgba(0,0,0,.15)";
      g.beginPath();g.ellipse(px+S*.5,py+S*.85,S*.38,S*.1,0,0,7);g.fill();
      g.fillStyle="#8d7458";
      g.beginPath();g.moveTo(px+S*.5,py+S*.1);
      g.lineTo(px+S*.92,py+S*.86);g.lineTo(px+S*.08,py+S*.86);
      g.closePath();g.fill();
      g.fillStyle="#a98e6e";
      g.beginPath();g.moveTo(px+S*.5,py+S*.1);
      g.lineTo(px+S*.92,py+S*.86);g.lineTo(px+S*.5,py+S*.86);
      g.closePath();g.fill();
      g.fillStyle="#f2f2f2";
      g.beginPath();g.moveTo(px+S*.5,py+S*.1);
      g.lineTo(px+S*.64,py+S*.36);g.lineTo(px+S*.5,py+S*.3);
      g.lineTo(px+S*.38,py+S*.37);g.closePath();g.fill();
    }else if(isProp(t)){
      drawBuilding(g,px,py,S,t,getOwner(x,y));
    }
  }
}
function drawTree(g,x,y,s){
  g.fillStyle="rgba(0,0,0,.18)";
  g.beginPath();g.ellipse(x+s*.5,y+s*.95,s*.4,s*.12,0,0,7);g.fill();
  g.fillStyle="#6d4c2f";
  g.fillRect(x+s*.42,y+s*.6,s*.16,s*.35);
  g.fillStyle="#2e7d32";
  g.beginPath();g.moveTo(x+s*.5,y);
  g.lineTo(x+s,y+s*.55);g.lineTo(x,y+s*.55);g.closePath();g.fill();
  g.fillStyle="#43a047";
  g.beginPath();g.moveTo(x+s*.5,y+s*.12);
  g.lineTo(x+s*.82,y+s*.5);g.lineTo(x+s*.18,y+s*.5);g.closePath();g.fill();
}
function drawBuilding(g,px,py,S,t,o){
  const main=o===null?"#969cad":PLAYER_COLOR[o];
  const dark=o===null?"#6a7080":PLAYER_DARK[o];
  g.fillStyle="rgba(0,0,0,.2)";
  g.fillRect(px+S*.12,py+S*.82,S*.76,S*.1);
  if(t===T.CITY){
    g.fillStyle="#d6d9e2";
    g.fillRect(px+S*.18,py+S*.34,S*.64,S*.52);
    g.fillStyle=main;
    g.fillRect(px+S*.12,py+S*.2,S*.76,S*.18);
    g.fillStyle="#4a5168";
    for(let i=0;i<3;i++)g.fillRect(px+S*(.26+i*.18),py+S*.48,S*.1,S*.12);
    g.fillStyle="#ffd76a";
    g.fillRect(px+S*.44,py+S*.48,S*.1,S*.12);
    g.fillStyle="#4a5168";
    g.fillRect(px+S*.42,py+S*.68,S*.16,S*.18);
  }else if(t===T.FACTORY){
    g.fillStyle="#b8bdc9";
    g.fillRect(px+S*.14,py+S*.42,S*.72,S*.44);
    g.fillStyle=dark;
    g.beginPath();g.moveTo(px+S*.14,py+S*.42);
    g.lineTo(px+S*.38,py+S*.26);g.lineTo(px+S*.38,py+S*.42);
    g.lineTo(px+S*.62,py+S*.26);g.lineTo(px+S*.62,py+S*.42);
    g.lineTo(px+S*.86,py+S*.26);g.lineTo(px+S*.86,py+S*.42);
    g.closePath();g.fill();
    g.fillStyle="#6a7080";
    g.fillRect(px+S*.2,py+S*.14,S*.12,S*.28);
    g.fillStyle=main;
    g.fillRect(px+S*.14,py+S*.6,S*.72,S*.1);
  }else{
    g.fillStyle=main;
    g.fillRect(px+S*.16,py+S*.36,S*.68,S*.5);
    g.fillStyle=dark;
    g.fillRect(px+S*.16,py+S*.36,S*.68,S*.1);
    g.fillStyle="#fff";
    g.fillRect(px+S*.42,py+S*.6,S*.16,S*.26);
    g.fillStyle="#3a3f55";
    g.fillRect(px+S*.46,py+S*.04,S*.05,S*.34);
    g.fillStyle=main;
    g.beginPath();g.moveTo(px+S*.51,py+S*.06);
    g.lineTo(px+S*.82,py+S*.14);g.lineTo(px+S*.51,py+S*.24);
    g.closePath();g.fill();
    g.fillStyle="#ffd76a";
    drawStar(g,px+S*.5,py+S*.48,S*.1);
  }
}
function drawStar(g,cx,cy,r){
  g.beginPath();
  for(let i=0;i<10;i++){
    const ang=-Math.PI/2+i*Math.PI/5;
    const rr=i%2===0?r:r*.45;
    g.lineTo(cx+Math.cos(ang)*rr,cy+Math.sin(ang)*rr);
  }
  g.closePath();g.fill();
}

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,TILE*COLS,TILE*ROWS);
  if(terrainDirty){renderTerrain();terrainDirty=false;}
  let sx=0,sy=0;
  if(shake>0){sx=(Math.random()-.5)*shake;sy=(Math.random()-.5)*shake;}
  ctx.save();
  ctx.translate(sx,sy);
  ctx.drawImage(terrCv,0,0,TILE*COLS,TILE*ROWS);
  for(const k in captureProgress){
    const[x,y]=k.split(",").map(Number);
    const cp=captureProgress[k];
    ctx.fillStyle="rgba(0,0,0,.55)";
    ctx.fillRect(x*TILE+3,y*TILE+TILE-7,TILE-6,5);
    ctx.fillStyle="#ffd76a";
    ctx.fillRect(x*TILE+3,y*TILE+TILE-7,(TILE-6)*Math.min(1,cp.amount/CAPTURE_NEED),5);
  }
  if(moveData&&mode==="move"){
    const pulse=.3+.12*Math.sin(timeNow/220);
    for(const k of moveData.reach){
      const[x,y]=k.split(",").map(Number);
      if(moveData.merge.has(k)){
        ctx.fillStyle=`rgba(110,255,150,${pulse+.1})`;
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
        ctx.fillStyle="#fff";
        ctx.font="bold "+Math.floor(TILE*.4)+"px sans-serif";
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText("＋",x*TILE+TILE/2,y*TILE+TILE*.28);
      }else{
        ctx.fillStyle=`rgba(90,170,255,${pulse})`;
        ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
        ctx.strokeStyle="rgba(150,210,255,.7)";
        ctx.strokeRect(x*TILE+1.5,y*TILE+1.5,TILE-3,TILE-3);
      }
    }
  }
  if(mode==="attack"){
    const pulse=.35+.18*Math.sin(timeNow/140);
    ctx.fillStyle=`rgba(255,70,70,${pulse})`;
    for(const u of attackTargets)
      ctx.fillRect(u.x*TILE,u.y*TILE,TILE,TILE);
  }
  const sorted=[...units].sort((a,b)=>a.py-b.py);
  for(const u of sorted){
    if(u.hp<=0)continue;
    const isAir=UNIT_DEF[u.type].cls==="air";
    const cx=u.px*TILE+TILE/2,cy=u.py*TILE+TILE/2;
    ctx.fillStyle=isAir?"rgba(0,0,0,.18)":"rgba(0,0,0,.28)";
    ctx.beginPath();ctx.ellipse(cx,cy+TILE*.36,TILE*.28,TILE*.08,0,0,7);ctx.fill();
    const spc=sprCv[u.type][u.pid];
    const w=TILE*.92,h=w*(spc.height/spc.width);
    const bob=(u.pid===turn&&!u.acted&&anims.length===0)
      ?Math.sin(timeNow/260+u.x*2)*TILE*.025:0;
    const airLift=isAir?-TILE*.16+Math.sin(timeNow/300+u.x)*TILE*.03:0;
    const grey=u.acted&&u.pid===turn;
    ctx.globalAlpha=grey?.55:1;
    ctx.drawImage(spc,cx-w/2,cy-h/2-TILE*.06+bob+airLift,w,h);
    ctx.globalAlpha=1;
    if(u.flash>0){
      ctx.globalCompositeOperation="lighter";
      ctx.fillStyle=`rgba(255,255,255,${u.flash*.85})`;
      ctx.fillRect(cx-w/2,cy-h/2-TILE*.06+airLift,w,h);
      ctx.globalCompositeOperation="source-over";
    }
    if(u.rank>0){
      const ss=TILE*.105;
      for(let i=0;i<u.rank;i++){
        const sx2=u.px*TILE+ss+2+i*(ss*2.1),sy2=u.py*TILE+ss+2;
        ctx.fillStyle="#3a2c00";drawStar(ctx,sx2,sy2,ss+1.3);
        ctx.fillStyle="#ffd76a";drawStar(ctx,sx2,sy2,ss);
      }
    }
    if(u.hp<MAX_HP){
      ctx.font="bold "+Math.floor(TILE*.3)+"px sans-serif";
      ctx.textAlign="right";ctx.textBaseline="alphabetic";
      ctx.lineWidth=3;ctx.strokeStyle="#000";
      ctx.strokeText(u.hp,u.px*TILE+TILE-3,u.py*TILE+TILE-3);
      ctx.fillStyle="#fff";
      ctx.fillText(u.hp,u.px*TILE+TILE-3,u.py*TILE+TILE-3);
    }
  }
  if(sel&&sel.unit&&sel.unit.hp>0){
    const u=sel.unit;
    const m=2+Math.sin(timeNow/180)*2;
    drawCursor(u.px*TILE,u.py*TILE,TILE,m,"#ffd76a");
  }
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    const s=p.size*TILE;
    ctx.fillRect(p.x*TILE-s/2,p.y*TILE-s/2,s,s);
  }
  ctx.globalAlpha=1;
  for(const r of rings){
    ctx.globalAlpha=Math.max(0,Math.min(1,r.life));
    ctx.strokeStyle="#ffd76a";ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(r.x*TILE,r.y*TILE,r.r*TILE,0,7);ctx.stroke();
  }
  ctx.globalAlpha=1;
  for(const p of popups){
    const yo=(1-p.life)*TILE*.8;
    ctx.font="bold "+Math.floor(TILE*.4)+"px sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.globalAlpha=Math.min(1,p.life*2);
    ctx.lineWidth=4;ctx.strokeStyle="#000";
    ctx.strokeText(p.text,p.x*TILE+TILE/2,p.y*TILE+TILE*.2-yo);
    ctx.fillStyle=p.color;
    ctx.fillText(p.text,p.x*TILE+TILE/2,p.y*TILE+TILE*.2-yo);
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
function drawCursor(x,y,s,m,color){
  const L=s*.28;
  ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineCap="round";
  const pts=[
    [x-m,y-m,1,1],[x+s+m,y-m,-1,1],
    [x-m,y+s+m,1,-1],[x+s+m,y+s+m,-1,-1]];
  for(const[px,py,dx,dy]of pts){
    ctx.beginPath();
    ctx.moveTo(px+dx*L,py);ctx.lineTo(px,py);ctx.lineTo(px,py+dy*L);
    ctx.stroke();
  }
}

/* ====================================================
   メインループ
==================================================== */
let lastT=0;
function loop(t){
  const dt=Math.min(50,t-lastT);lastT=t;timeNow=t;
  runAnims(dt);
  for(const p of particles){
    p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;
    p.vy+=4*dt/1000;p.life-=dt/1000;
  }
  particles=particles.filter(p=>p.life>0);
  for(const p of popups)p.life-=dt/900;
  popups=popups.filter(p=>p.life>0);
  for(const r of rings){r.r+=dt/380;r.life-=dt/650;}
  rings=rings.filter(r=>r.life>0);
  for(const u of units)if(u.flash>0)u.flash=Math.max(0,u.flash-dt/180);
  if(shake>0)shake=Math.max(0,shake-dt/40);
  if(map.length)draw();
  requestAnimationFrame(loop);
}

buildSprites();
resize(true);
requestAnimationFrame(loop);
// 過去のクリアスコアをlocalStorageから復元
try{for(let i=0;i<STAGES.length;i++){if(localStorage.getItem('mwdx_s'+i)!==null)cleared.add(i);}}catch(e){}
// タイトル画面に「つづきから」ボタンを追加（途中セーブがある場合）
(function initTitleContinue(){
  const sv=loadSaveData();
  if(!sv||!STAGES[sv.stage])return;
  const row=document.getElementById("titleRow");
  if(!row)return;
  const btn=document.createElement("button");
  btn.className="gold center";
  btn.textContent=`▶ つづきから（STAGE ${sv.stage+1}　${STAGES[sv.stage].name}）`;
  btn.onclick=resumeGame;
  row.insertBefore(btn,row.firstChild);
})();
</script>
